# Doc Drift Mappings
# Maps source path patterns to documentation files that should be reviewed
# when those paths are modified in a feat: or fix: commit.
# Used by both the weekly auditor (doc-drift-auditor.yml) and PR check (claude-code-review.yml).
# Extend this file as new services or docs are added.

mappings:
  - source_pattern: "services/event-management-service/"
    docs:
      - "docs/architecture/06a-workflow-state-machines.md"
      - "docs/architecture/06-backend-architecture.md"
      - "docs/prd/epic-5-enhanced-organizer-workflows.md"

  - source_pattern: "services/speaker-coordination-service/"
    docs:
      - "docs/architecture/06a-workflow-state-machines.md"
      - "docs/architecture/06d-notification-system.md"
      - "docs/prd/epic-6-speaker-portal-support.md"
      - "docs/prd/epic-9-speaker-authentication.md"

  - source_pattern: "services/company-user-management-service/"
    docs:
      - "docs/architecture/06b-user-lifecycle-sync.md"
      - "docs/architecture/06-backend-architecture.md"

  - source_pattern: "services/partner-coordination-service/"
    docs:
      - "docs/prd/epic-8-partner-coordination.md"
      - "docs/architecture/06-backend-architecture.md"

  - source_pattern: "services/attendee-experience-service/"
    docs:
      - "docs/prd/epic-4-public-website-content-discovery.md"
      - "docs/architecture/06-backend-architecture.md"

  - source_pattern: "api-gateway/"
    docs:
      - "docs/architecture/06-backend-architecture.md"
      - "docs/api/"

  - source_pattern: "infrastructure/"
    docs:
      - "docs/architecture/08-operations-security.md"
      - "docs/architecture/06-backend-architecture.md"

  - source_pattern: "web-frontend/src/"
    docs:
      - "docs/architecture/06-backend-architecture.md"

  - source_pattern: "shared-kernel/"
    docs:
      - "docs/architecture/06-backend-architecture.md"
      - "docs/architecture/06a-workflow-state-machines.md"

  - source_pattern: "docs/api/"
    docs: []   # doc changes in api/ are themselves the doc — no secondary check needed

# Commit type prefixes that are ALWAYS skipped — no flagging
skip_commit_types:
  - "chore"
  - "test"
  - "docs"
  - "style"
  - "refactor"
  - "build"
  - "ci"

# Only these types are audited
audit_commit_types:
  - "feat"
  - "fix"
