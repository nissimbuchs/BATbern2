        if: steps.deployment-strategy.outputs.code_only != 'true' && steps.prepare-deployment.outputs.use_layer_deployment != 'true' && contains(steps.changes.outputs.changed_services, 'api-gateway')
        working-directory: ./infrastructure
        run: |
          echo "🎯 Selective deployment: API Gateway"
          npx cdk deploy BATbern-staging-ApiGateway --context environment=staging --context version=${{ github.sha }} --require-approval never
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after API Gateway (selective)
        if: steps.deployment-strategy.outputs.code_only != 'true' && steps.prepare-deployment.outputs.use_layer_deployment != 'true' && contains(steps.changes.outputs.changed_services, 'api-gateway')
