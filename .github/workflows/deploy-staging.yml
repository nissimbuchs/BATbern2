            echo "Running header propagation tests..."
            if ./scripts/ci/header-propagation-tests.sh https://api.staging.batbern.ch; then
              echo "✅ Header propagation tests passed"
            else
              echo "::warning::Header propagation tests failed - see details above"
              echo "::warning::This is a non-blocking test failure"
            fi
          else
            echo "::warning::Header propagation tests script not found"
          fi

      - name: Authenticate with Cognito for Bruno tests
        id: get-bruno-auth-token
        run: |
          # Authenticate directly with Cognito using bootstrap user credentials
          # This avoids the need to manually refresh GitHub secrets
          echo "Authenticating with Cognito..."

          # Cognito configuration for staging
          REGION="eu-central-1"
          USER_POOL_ID="eu-central-1_FtgfxgQRF"
          CLIENT_ID="1b53lci6qpqsmdn0u3e8s4knvv"
          EMAIL="${{ secrets.STAGING_TEST_USER_EMAIL }}"
          PASSWORD="${{ secrets.STAGING_TEST_USER_PASSWORD }}"

          if [ -z "$EMAIL" ] || [ -z "$PASSWORD" ]; then
            echo "::error::STAGING_TEST_USER_EMAIL and STAGING_TEST_USER_PASSWORD secrets must be set"
            echo "::error::Go to: Repository → Settings → Secrets and variables → Actions"
            echo "::error::Add: STAGING_TEST_USER_EMAIL = nissim@buchs.be"
            echo "::error::Add: STAGING_TEST_USER_PASSWORD = <password>"
          fi

          # Authenticate with Cognito
          auth_response=$(aws cognito-idp initiate-auth \
            --region $REGION \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id $CLIENT_ID \
            --auth-parameters USERNAME="$EMAIL",PASSWORD="$PASSWORD" \
            --output json 2>&1)

          if [ $? -ne 0 ]; then
            echo "::error::Cognito authentication failed"
            echo "$auth_response"
            echo "::warning::Bruno auth failed, non blocking"
          fi

          # Extract ID token (contains 'aud' claim required by JWT validator)
          ID_TOKEN=$(echo "$auth_response" | jq -r '.AuthenticationResult.IdToken')

          if [ "$ID_TOKEN" = "null" ] || [ -z "$ID_TOKEN" ]; then
            echo "::error::Failed to extract ID token from Cognito response"
          fi

          echo "✅ Successfully authenticated with Cognito"
          echo "AUTH_TOKEN=$ID_TOKEN" >> $GITHUB_OUTPUT

      - name: Run Bruno API contract tests
        continue-on-error: true
        run: |
          if [ -f "scripts/ci/run-bruno-tests.sh" ]; then
            chmod +x scripts/ci/run-bruno-tests.sh
            echo "Running Bruno API contract tests..."
            # Pass auth token as second argument
            if ./scripts/ci/run-bruno-tests.sh staging "${{ steps.get-bruno-auth-token.outputs.AUTH_TOKEN }}"; then
              echo "✅ Bruno API contract tests completed"
            else
              echo "::warning::Bruno API contract tests failed - see details above"
              echo "::warning::This is a non-blocking test failure"
