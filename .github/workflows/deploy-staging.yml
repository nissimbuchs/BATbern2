name: Deploy to Staging

on:
  workflow_call:
    # Allow this workflow to be called from other workflows (like build.yml)
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g., abc1234-staging.123)'
        required: false
        type: string
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (leave empty to auto-generate)'
        required: false
        type: string

env:
  AWS_REGION: eu-central-1
  ENVIRONMENT: staging

jobs:
  deploy-to-staging:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to enable git diff between commits

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: ./infrastructure
        run: npm ci

      - name: Detect changed components
        id: changes
        run: |
          echo "Detecting which components changed..."

          # For PR events, compare against base branch
          # For push events, compare against previous commit
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # For push events, compare with previous commit
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "Comparing $BASE_SHA...$HEAD_SHA"

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA 2>/dev/null || echo "")

          # If we can't get diff (e.g., first push), deploy everything
          if [ -z "$CHANGED_FILES" ]; then
            echo "⚠️  Cannot determine changed files, will deploy all stacks"
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "services=true" >> $GITHUB_OUTPUT
            echo "infrastructure=true" >> $GITHUB_OUTPUT
            echo "deploy_all=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          # Initialize all flags as false
          echo "frontend=false" >> $GITHUB_OUTPUT
          echo "infrastructure=false" >> $GITHUB_OUTPUT
          echo "deploy_all=false" >> $GITHUB_OUTPUT
          echo "needs_database_backup=false" >> $GITHUB_OUTPUT

          # Check for frontend changes
          if echo "$CHANGED_FILES" | grep -q "^web-frontend/"; then
            echo "✓ Frontend changes detected"
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi

          # Check for infrastructure changes (requires full deployment)
          if echo "$CHANGED_FILES" | grep -qE "^infrastructure/(lib/stacks|bin)/|^infrastructure/package"; then
            echo "✓ Infrastructure code changes detected - will deploy all stacks"
            echo "infrastructure=true" >> $GITHUB_OUTPUT
            echo "deploy_all=true" >> $GITHUB_OUTPUT
            echo "needs_database_backup=true" >> $GITHUB_OUTPUT
          fi

          # Detect changed services (for selective deployment)
          CHANGED_SERVICES=""

          if echo "$CHANGED_FILES" | grep -q "^services/event-management-service/"; then
            echo "✓ Event Management service changed"
            CHANGED_SERVICES="$CHANGED_SERVICES event-management"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/speaker-coordination-service/"; then
            echo "✓ Speaker Coordination service changed"
            CHANGED_SERVICES="$CHANGED_SERVICES speaker-coordination"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/partner-coordination-service/"; then
            echo "✓ Partner Coordination service changed"
            CHANGED_SERVICES="$CHANGED_SERVICES partner-coordination"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/attendee-experience-service/"; then
            echo "✓ Attendee Experience service changed"
            CHANGED_SERVICES="$CHANGED_SERVICES attendee-experience"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/company-user-management-service/"; then
            echo "✓ Company Management service changed"
            CHANGED_SERVICES="$CHANGED_SERVICES company-management"
          fi

          if echo "$CHANGED_FILES" | grep -q "^api-gateway/"; then
            echo "✓ API Gateway service changed"
            CHANGED_SERVICES="$CHANGED_SERVICES api-gateway-service api-gateway"
          fi

          if echo "$CHANGED_FILES" | grep -q "^shared-kernel/"; then
            echo "✓ Shared kernel changed - will deploy all services"
            CHANGED_SERVICES="all-services"
          fi

          # Store changed services
          echo "changed_services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

          # If any service changed, we might need database backup
          if [ -n "$CHANGED_SERVICES" ]; then
            echo "services=true" >> $GITHUB_OUTPUT
            # Check if actual Flyway migrations changed (V*.sql files only)
            if echo "$CHANGED_FILES" | grep -qE "db/migration/V[0-9]+.*\.sql"; then
              echo "needs_database_backup=true" >> $GITHUB_OUTPUT
              echo "✓ Database migration detected - backup will be created"
            fi
          else
            echo "services=false" >> $GITHUB_OUTPUT
          fi

          # Summary
          echo ""
          echo "📊 Deployment plan:"
          echo "  Frontend: $([ "${{ steps.changes.outputs.frontend }}" = "true" ] && echo "YES" || echo "no")"
          echo "  Services: ${CHANGED_SERVICES:-none}"
          echo "  Infrastructure: $([ "${{ steps.changes.outputs.infrastructure }}" = "true" ] && echo "YES (full deployment)" || echo "no")"

      - name: Build frontend for deployment
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.deploy_all == 'true'
        working-directory: ./web-frontend
        run: |
          if [ -f "package.json" ]; then
            echo "Building environment-agnostic frontend..."
            echo "ℹ️  Frontend loads configuration at runtime from backend API (GET /api/v1/config)"
            echo "ℹ️  This enables 'build once, deploy everywhere' pattern"
            npm ci
            npm run build
            echo "✅ Frontend build complete: dist/ ready for CDK deployment"
          else
            echo "::warning::Frontend package.json not found, skipping build"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create database backup
        if: steps.changes.outputs.needs_database_backup == 'true'
        run: |
          echo "Creating database backup (changes detected that may affect database)..."
          SNAPSHOT_ID="batbern-staging-pre-deploy-$(date +%Y%m%d-%H%M%S)"

          if aws rds describe-db-instances --db-instance-identifier batbern-staging-postgres --region ${{ env.AWS_REGION }} 2>/dev/null; then
            aws rds create-db-snapshot \
              --db-instance-identifier batbern-staging-postgres \
              --db-snapshot-identifier $SNAPSHOT_ID \
              --region ${{ env.AWS_REGION }}

            echo "Waiting for snapshot to complete..."
            aws rds wait db-snapshot-completed \
              --db-snapshot-identifier $SNAPSHOT_ID \
              --region ${{ env.AWS_REGION }}

            echo "SNAPSHOT_ID=$SNAPSHOT_ID" >> $GITHUB_ENV
            echo "✅ Database backup created: $SNAPSHOT_ID"
          else
            echo "::warning::Database instance not found, skipping backup"
          fi

      - name: Skip database backup
        if: steps.changes.outputs.needs_database_backup != 'true'
        run: |
          echo "ℹ️  Skipping database backup - no changes detected that affect database"
          echo "   (Dockerfile or migration files not modified)"

      # Database migrations are handled automatically by each microservice on startup
      # Each service has Flyway enabled (spring.flyway.enabled: true) and runs its own migrations
      # This eliminates the need for:
      # 1. GitHub Actions to access private RDS (security issue)
      # 2. Centralized migration management (anti-pattern for microservices)
      #
      # Migrations run when ECS tasks start in the VPC with database access
      - name: Database migrations info
        run: |
          echo "ℹ️  Database migrations are handled automatically by microservices"
          echo "   Each service runs Flyway migrations on startup (spring.flyway.enabled: true)"
          echo "   Services have VPC access to RDS, GitHub Actions does not"
          echo "   This is the standard pattern for microservices architecture"

      - name: Re-authenticate with AWS before deployment
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine Docker image tag
        id: image-tag
        run: |
          # Use provided image_tag input if available (from workflow_call), otherwise generate it
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
            echo "Using provided image tag: $IMAGE_TAG"
          else
            # Fallback: Generate from current context (for manual workflow_dispatch)
            SHORT_SHA="${GITHUB_SHA:0:7}"
            IMAGE_TAG="${SHORT_SHA}-staging.${GITHUB_RUN_NUMBER}"
            echo "Generated image tag: $IMAGE_TAG"
          fi

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Using Docker image tag: $IMAGE_TAG"

      - name: Determine deployment strategy
        id: deployment-strategy
        run: |
          # Check if this qualifies for fast-path deployment
          CODE_ONLY="false"

          # Get changed files for analysis
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA 2>/dev/null || echo "")

          # Fast-path conditions:
          # 1. No infrastructure changes
          # 2. No Dockerfile changes
          # 3. No database migrations
          # 4. Only service code changes

          if [ "${{ steps.changes.outputs.infrastructure }}" != "true" ] && \
             ! echo "$CHANGED_FILES" | grep -qE "Dockerfile|db/migration/V[0-9]+.*\.sql" && \
             [ -n "${{ steps.changes.outputs.changed_services }}" ] && \
             [ "${{ steps.changes.outputs.changed_services }}" != "all-services" ]; then
            CODE_ONLY="true"
            echo "🚀 Fast-path eligible: Code-only changes detected"
            echo "   Services: ${{ steps.changes.outputs.changed_services }}"
          else
            echo "📦 Standard deployment required"
            if [ "${{ steps.changes.outputs.infrastructure }}" = "true" ]; then
              echo "   Reason: Infrastructure changes detected"
            elif echo "$CHANGED_FILES" | grep -qE "Dockerfile"; then
              echo "   Reason: Dockerfile changes detected"
            elif echo "$CHANGED_FILES" | grep -qE "db/migration/V[0-9]+.*\.sql"; then
              echo "   Reason: Database migration changes detected"
            fi
          fi

          echo "code_only=$CODE_ONLY" >> $GITHUB_OUTPUT

      - name: Fast-path code deployment
        if: steps.deployment-strategy.outputs.code_only == 'true'
        run: |
          echo "🚀 Executing fast-path deployment (bypasses CloudFormation)"

          IFS=',' read -ra SERVICES <<< "${{ steps.changes.outputs.changed_services }}"

          for SERVICE in "${SERVICES[@]}"; do
            # Trim whitespace
            SERVICE=$(echo "$SERVICE" | xargs)

            echo "📦 Fast-path deploying: $SERVICE"

            # Map service name to ECS service name pattern
            case $SERVICE in
              event-management)
                ECS_SERVICE_PATTERN="BATbern-staging-EventManagement-Service"
                ;;
              company-management)
                ECS_SERVICE_PATTERN="BATbern-staging-CompanyManagement-Service"
                ;;
              speaker-coordination)
                ECS_SERVICE_PATTERN="BATbern-staging-SpeakerCoordination-Service"
                ;;
              partner-coordination)
                ECS_SERVICE_PATTERN="BATbern-staging-PartnerCoordination-Service"
                ;;
              attendee-experience)
                ECS_SERVICE_PATTERN="BATbern-staging-AttendeeExperience-Service"
                ;;
              api-gateway-service|api-gateway)
                ECS_SERVICE_PATTERN="BATbern-staging-ApiGatewayService-Service"
                ;;
              *)
                echo "::warning::Unknown service: $SERVICE, skipping"
                continue
                ;;
            esac

            # Find exact service name
            FULL_SERVICE=$(aws ecs list-services \
              --cluster batbern-staging \
              --region ${{ env.AWS_REGION }} \
              --query "serviceArns[?contains(@, '${ECS_SERVICE_PATTERN}')]" \
              --output text | xargs -n1 basename | head -n1)

            if [ -z "$FULL_SERVICE" ]; then
              echo "::error::Service not found matching pattern: $ECS_SERVICE_PATTERN"
              exit 1
            fi

            echo "✅ Found service: $FULL_SERVICE"

            # Execute fast-path update
            chmod +x ./scripts/ci/update-ecs-task.sh
            ./scripts/ci/update-ecs-task.sh \
              batbern-staging \
              $FULL_SERVICE \
              ${{ steps.image-tag.outputs.IMAGE_TAG }}
          done

          echo "🎉 Fast-path deployment complete (2-5 min vs 30-40 min with CloudFormation)"

      - name: Prepare deployment
        if: steps.deployment-strategy.outputs.code_only != 'true'
        id: prepare-deployment
        working-directory: ./infrastructure
        run: |
          if [ ! -f "package.json" ]; then
            echo "::error::Infrastructure package.json not found"
            exit 1
          fi

          echo "Deploying version: ${{ github.sha }}"
          echo "IMAGE_TAG: $IMAGE_TAG"

          # Verify IMAGE_TAG is set (critical for using pre-built images)
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::IMAGE_TAG environment variable is not set!"
            echo "::error::This means Docker images will be built from source (slow and may fail)"
            exit 1
          fi

          # Validate that ECR images exist before deployment
          echo "🔍 Validating ECR images exist for IMAGE_TAG: $IMAGE_TAG"
          CHANGED_SERVICES="${{ steps.changes.outputs.changed_services }}"
          VALIDATION_FAILED=false

          for SERVICE in event-management-service speaker-coordination-service partner-coordination-service attendee-experience-service company-user-management-service api-gateway; do
            # Only check services that are being deployed
            if [ "${{ steps.changes.outputs.deploy_all }}" = "true" ] || echo "$CHANGED_SERVICES" | grep -q "$SERVICE" || [ "$CHANGED_SERVICES" = "all-services" ]; then
              REPO_NAME="batbern/staging/${SERVICE}"

              echo "  Checking ${REPO_NAME}:${IMAGE_TAG}..."

              if ! aws ecr describe-images \
                --repository-name "$REPO_NAME" \
                --image-ids imageTag="$IMAGE_TAG" \
                --region ${{ env.AWS_REGION }} \
                --query 'imageDetails[0].imageTags[0]' \
                --output text 2>/dev/null | grep -q "$IMAGE_TAG"; then

                echo "::error::❌ Image not found: ${REPO_NAME}:${IMAGE_TAG}"
                VALIDATION_FAILED=true
              else
                echo "  ✅ Image exists: ${REPO_NAME}:${IMAGE_TAG}"
              fi
            fi
          done

          if [ "$VALIDATION_FAILED" = "true" ]; then
            echo ""
            echo "::error::One or more Docker images do not exist in ECR!"
            echo "::error::This usually means the build workflow did not complete successfully."
            echo "::error::Please check that the Build workflow completed and pushed all images."
            exit 1
          fi

          echo "✅ All required ECR images validated successfully"

          # Determine which stacks to deploy
          STACKS_TO_DEPLOY=""
          USE_LAYER_DEPLOYMENT=false

          # Map changed services to stack names
          CHANGED_SERVICES="${{ steps.changes.outputs.changed_services }}"

          if [ "${{ steps.changes.outputs.deploy_all }}" = "true" ]; then
            echo "📦 Infrastructure changes detected: using layer-based deployment"
            USE_LAYER_DEPLOYMENT=true
          elif [ "$CHANGED_SERVICES" = "all-services" ]; then
            # Shared kernel changed - deploy all service stacks
            echo "🔄 Shared kernel changed: deploying all service stacks"
            STACKS_TO_DEPLOY="BATbern-staging-EventManagement BATbern-staging-SpeakerCoordination BATbern-staging-PartnerCoordination BATbern-staging-AttendeeExperience BATbern-staging-CompanyManagement BATbern-staging-ApiGatewayService BATbern-staging-ApiGateway"
          else
            # Selective deployment: only deploy changed service stacks
            echo "🎯 Selective deployment: deploying only changed service stacks"

            # Deploy specific service stacks
            if echo "$CHANGED_SERVICES" | grep -q "event-management"; then
              echo "  ✓ Event Management service"
              STACKS_TO_DEPLOY="$STACKS_TO_DEPLOY BATbern-staging-EventManagement"
            fi

            if echo "$CHANGED_SERVICES" | grep -q "speaker-coordination"; then
              echo "  ✓ Speaker Coordination service"
              STACKS_TO_DEPLOY="$STACKS_TO_DEPLOY BATbern-staging-SpeakerCoordination"
            fi

            if echo "$CHANGED_SERVICES" | grep -q "partner-coordination"; then
              echo "  ✓ Partner Coordination service"
              STACKS_TO_DEPLOY="$STACKS_TO_DEPLOY BATbern-staging-PartnerCoordination"
            fi

            if echo "$CHANGED_SERVICES" | grep -q "attendee-experience"; then
              echo "  ✓ Attendee Experience service"
              STACKS_TO_DEPLOY="$STACKS_TO_DEPLOY BATbern-staging-AttendeeExperience"
            fi

            if echo "$CHANGED_SERVICES" | grep -q "company-management"; then
              echo "  ✓ Company Management service"
              STACKS_TO_DEPLOY="$STACKS_TO_DEPLOY BATbern-staging-CompanyManagement"
            fi

            if echo "$CHANGED_SERVICES" | grep -q "api-gateway"; then
              echo "  ✓ API Gateway service"
              STACKS_TO_DEPLOY="$STACKS_TO_DEPLOY BATbern-staging-ApiGatewayService BATbern-staging-ApiGateway"
            fi
          fi

          # Add frontend stack if changed (independent of deploy_all)
          if [ "${{ steps.changes.outputs.frontend }}" = "true" ]; then
            echo "  ✓ Frontend"
            STACKS_TO_DEPLOY="$STACKS_TO_DEPLOY BATbern-staging-Frontend"
          fi

          # Output deployment strategy
          echo "use_layer_deployment=$USE_LAYER_DEPLOYMENT" >> $GITHUB_OUTPUT
          echo "stacks_to_deploy=$STACKS_TO_DEPLOY" >> $GITHUB_OUTPUT
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      # Layer-based deployment with token refresh between layers
      - name: Deploy Layer 0 - Foundation
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 20
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 0: Foundation (CICD, DNS, Monitoring, SES)"
          npm run deploy:staging:layer0-foundation --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Layer 0
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 1 - Infrastructure
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 20
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 1: Infrastructure (Network, Secrets, EventBus)"
          npm run deploy:staging:layer1-infrastructure --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Layer 1
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 2 - Data
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 25
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 2: Data (Database, Storage, Bastion)"
          npm run deploy:staging:layer2-data --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Layer 2
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 3 - Application
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 20
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 3: Application (Cognito, Cluster)"
          npm run deploy:staging:layer3-application --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Layer 3
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 4.1 - Company Management Service
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 30
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 4.1: Company Management Service"
          npm run deploy:staging:layer4-company-management --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Company Management
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 4.2 - Event Management Service
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 30
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 4.2: Event Management Service"
          npm run deploy:staging:layer4-event-management --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Event Management
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 4.3 - Speaker Coordination Service
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 30
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 4.3: Speaker Coordination Service"
          npm run deploy:staging:layer4-speaker-coordination --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Speaker Coordination
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 4.4 - Partner Coordination Service
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 30
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 4.4: Partner Coordination Service"
          npm run deploy:staging:layer4-partner-coordination --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Partner Coordination
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Layer 4.5 - Attendee Experience Service
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        timeout-minutes: 30
        working-directory: ./infrastructure
        run: |
          echo "🏗️  Layer 4.5: Attendee Experience Service"
          npm run deploy:staging:layer4-attendee-experience --context version=${{ github.sha }}
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Re-authenticate after Attendee Experience
        if: steps.prepare-deployment.outputs.use_layer_deployment == 'true'
        uses: aws-actions/configure-aws-credentials@v4
