      - name: Selective Deploy - Attendee Experience
        if: steps.deployment-strategy.outputs.code_only != 'true' && steps.prepare-deployment.outputs.use_layer_deployment != 'true' && contains(steps.changes.outputs.changed_services, 'attendee-experience')
        working-directory: ./infrastructure
