name: Security Scan (OWASP ZAP)

# OWASP ZAP dynamic security scanning (DAST) against the staging environment.
#
# Coverage:
#   - API scan: active scan of 5 core REST APIs using their OpenAPI specs
#   - Frontend scan: baseline (passive) scan of the React SPA
#
# Triggers:
#   - Manual:  GitHub Actions UI → "Run workflow"
#   - Weekly:  Mondays at 03:00 UTC (off-peak, staging environment)
#
# Reports:
#   - HTML artifact (retained 30 days) — downloadable from the Actions run page
#   - GitHub Issue created automatically if HIGH/MEDIUM findings are detected
#
# Tightening over time:
#   - After the first clean run, add explicit FAIL rules to .zap/rules.tsv
#     for any finding categories that should block CI.
#   - Consider adding SARIF upload (github/codeql-action/upload-sarif) once
#     GitHub Advanced Security is enabled for the repo.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'

env:
  API_BASE_URL: https://api.staging.batbern.ch
  FRONTEND_URL: https://staging.batbern.ch

jobs:
  # ═══════════════════════════════════════════════════════════════
  # API SCANS — one job per core API spec (active scan)
  # ═══════════════════════════════════════════════════════════════
  zap-api-scan:
    name: ZAP API — ${{ matrix.api }}
    runs-on: ubuntu-latest
    continue-on-error: true   # findings reported, never block the pipeline
    strategy:
      fail-fast: false         # run all APIs even if one fails
      matrix:
        include:
          - api: events
            spec: docs/api/events-api.openapi.yml
          - api: companies
            spec: docs/api/companies-api.openapi.yml
          - api: speakers
            spec: docs/api/speakers-api.openapi.yml
          - api: partners
            spec: docs/api/partners-api.openapi.yml
          - api: attendees
            spec: docs/api/attendees-api.openapi.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP API Scan — ${{ matrix.api }}
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          # Pass the OpenAPI spec as a file path inside the Docker workspace mount.
          # The action mounts GITHUB_WORKSPACE at /zap/wrk/, so the spec is accessible
          # at /zap/wrk/<spec-path>. ZAP reads the spec, then actively scans the server
          # URL declared inside the spec (https://api.staging.batbern.ch).
          target: /zap/wrk/${{ matrix.spec }}
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          # -a  include alpha passive scan rules
          # -I  do not return failure on warnings (we use rules.tsv for that)
          cmd_options: '-a -I'
          issue_title: 'ZAP Security Findings — ${{ matrix.api }} API'
          # Unique artifact name per matrix job — prevents naming collision between
          # the 5 parallel jobs (default is 'zap_scan' for all jobs)
          artifact_name: zap-api-${{ matrix.api }}

      - name: Stage JSON + log reports for projectdoc — ${{ matrix.api }}
        if: always()
        run: |
          mkdir -p zap-json-stage zap-json-stage/zap-logs
          cp report_json.json "zap-json-stage/zap-${{ matrix.api }}.json" 2>/dev/null || true
          # The ZAP action writes the console log to zap.out
          cp zap.out "zap-json-stage/zap-logs/zap-${{ matrix.api }}.log" 2>/dev/null || true

      - name: Upload HTML report — ${{ matrix.api }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-report-${{ matrix.api }}
          path: report_html.html
          retention-days: 30

      - name: Upload JSON report — ${{ matrix.api }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-json-${{ matrix.api }}
          path: zap-json-stage/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND SCAN — passive baseline scan of the React SPA
  # ═══════════════════════════════════════════════════════════════
  zap-frontend-scan:
    name: ZAP Frontend Baseline
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan — Frontend
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: ${{ env.FRONTEND_URL }}
          rules_file_name: '.zap/rules.tsv'
          # -a   include alpha passive scan rules
          # -I   do not return failure on warnings
          # --autooff  disable automation framework (avoids report path issues)
          cmd_options: '-a -I --autooff'
          issue_title: 'ZAP Security Findings — Frontend'
          artifact_name: zap-frontend-baseline

      - name: Stage JSON + log reports for projectdoc — frontend
        if: always()
        run: |
          mkdir -p zap-json-stage zap-json-stage/zap-logs
          cp report_json.json "zap-json-stage/zap-frontend.json" 2>/dev/null || true
          cp zap.out "zap-json-stage/zap-logs/zap-frontend.log" 2>/dev/null || true

      - name: Upload HTML report — frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-frontend-report
          path: report_html.html
          retention-days: 30

      - name: Upload JSON report — frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-json-frontend
          path: zap-json-stage/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # SUMMARY — aggregate status + publish combined JSON artifact
  # ═══════════════════════════════════════════════════════════════
  security-scan-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [zap-api-scan, zap-frontend-scan]
    if: always()

    steps:
      - name: Download all ZAP JSON reports
        uses: actions/download-artifact@v4
        with:
          pattern: zap-json-*
          merge-multiple: true
          path: security-reports/
        continue-on-error: true

      - name: Upload combined ZAP JSON reports (for projectdoc)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: security-reports/
          retention-days: 30

      - name: Print summary
        run: |
          echo "## OWASP ZAP Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Scans (events, companies, speakers, partners, attendees) | ${{ needs.zap-api-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Baseline | ${{ needs.zap-frontend-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reports**: Download HTML artifacts from this workflow run." >> $GITHUB_STEP_SUMMARY
          echo "**Projectdoc**: Combined JSON artifact \`zap-reports\` ready for dashboard." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**False positive tuning**: Edit \`.zap/rules.tsv\` to suppress known FPs." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Target: ${{ env.API_BASE_URL }} / ${{ env.FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
