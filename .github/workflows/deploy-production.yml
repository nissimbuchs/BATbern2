name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Commit SHA to deploy (7-char short SHA from main branch, e.g., a3f7c91)'
        required: true
      migrate_database:
        description: 'Run database migrations'
        type: boolean
        default: true
      release_name:
        description: 'Optional release name (e.g. v1.0.0). If empty, release is tagged prod/<sha>.'
        required: false

env:
  AWS_REGION: eu-central-1
  ENVIRONMENT: production

jobs:
  pre-deployment-checks:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checkout
    environment:
      name: production
      url: https://www.batbern.ch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify commit is on main branch
        run: |
          git fetch origin main
          VERSION="${{ github.event.inputs.version }}"

          if ! git cat-file -e "${VERSION}^{commit}" 2>/dev/null; then
            echo "::error::Commit ${VERSION} does not exist in this repository"
            exit 1
          fi

          if ! git merge-base --is-ancestor "${VERSION}" origin/main 2>/dev/null; then
            echo "::error::Commit ${VERSION} is not on the main branch. Only commits merged to main can be deployed to production."
            exit 1
          fi

          echo "✅ Commit ${VERSION} is on main branch — safe to deploy"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422940799530:role/batbern-production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Check staging deployment
        run: |
          echo "Verifying version is deployed and validated in staging..."

          # Check if ECS cluster exists (graceful degradation for initial setup)
          if ! aws ecs describe-clusters --clusters batbern-staging --region ${{ env.AWS_REGION }} 2>/dev/null | grep -q "batbern-staging"; then
            echo "⚠️  Staging cluster not found - skipping validation (infrastructure not yet deployed)"
            exit 0
          fi

          # Get the version from the most recent staging deployment
          STAGING_VERSION=$(aws ecs describe-services \
            --cluster batbern-staging \
            --services api-gateway-service \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].taskDefinition' \
            --output text 2>/dev/null | grep -oP ':\K[^:]+$' || echo "unknown")

          echo "Staging version: ${STAGING_VERSION}"
          echo "Requested production version: ${{ github.event.inputs.version }}"

          # Verify that staging is running the same version
          if [[ "${STAGING_VERSION}" != *"${{ github.event.inputs.version }}"* ]]; then
            echo "⚠️  Warning: Staging is running ${STAGING_VERSION}, but production deployment requested for ${{ github.event.inputs.version }}"
            echo "It is recommended to deploy and validate in staging first"
            # Don't fail - allow deployment with warning for flexibility
          else
            echo "✅ Version ${{ github.event.inputs.version }} is deployed in staging"
          fi

  backup-database:
    needs: pre-deployment-checks
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checkout

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422940799530:role/batbern-production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Create RDS snapshot
        id: backup
        run: |
          SNAPSHOT_ID="batbern-prod-pre-deploy-$(date +%Y%m%d-%H%M%S)"

          if aws rds describe-db-instances --db-instance-identifier batbern-prod-postgres --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Creating database backup..."
            aws rds create-db-snapshot \
              --db-instance-identifier batbern-prod-postgres \
              --db-snapshot-identifier $SNAPSHOT_ID \
              --region ${{ env.AWS_REGION }}

            echo "Waiting for snapshot to complete..."
            aws rds wait db-snapshot-completed \
              --db-snapshot-identifier $SNAPSHOT_ID \
              --region ${{ env.AWS_REGION }}

            echo "snapshot_id=$SNAPSHOT_ID" >> $GITHUB_OUTPUT
            echo "✅ Database backup created: $SNAPSHOT_ID"
          else
            echo "::warning::Database instance not found, skipping backup"
            echo "snapshot_id=none" >> $GITHUB_OUTPUT
          fi

    outputs:
      snapshot_id: ${{ steps.backup.outputs.snapshot_id }}

  database-migration-info:
    needs: backup-database
    runs-on: ubuntu-latest
    steps:
      # Database migrations are handled automatically by each microservice on startup
      # Each service has Flyway enabled (spring.flyway.enabled: true) and runs its own migrations
      # This eliminates the need for:
      # 1. GitHub Actions to access private RDS (security issue - database is in private subnet)
      # 2. Centralized migration management (anti-pattern for microservices)
      #
      # Migrations run when ECS tasks start in the VPC with database access
      - name: Database migrations info
        run: |
          echo "ℹ️  Database migrations are handled automatically by microservices"
          echo "   Each service runs Flyway migrations on startup (spring.flyway.enabled: true)"
          echo "   Services have VPC access to RDS, GitHub Actions does not"
          echo "   This is the standard pattern for microservices architecture"
          echo "   Migration input parameter is deprecated and has no effect"

  blue-green-deployment:
    needs: [backup-database, database-migration-info]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422940799530:role/batbern-production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: ./infrastructure
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "::warning::Infrastructure package.json not found"
            exit 0
          fi

      - name: Build frontend for deployment
        working-directory: ./web-frontend
        run: |
          if [ -f "package.json" ]; then
            echo "Building environment-agnostic frontend..."
            echo "ℹ️  Frontend loads configuration at runtime from backend API (GET /api/v1/config)"
            echo "ℹ️  This enables 'build once, deploy everywhere' pattern"
            npm ci
            npm run build
            echo "✅ Frontend build complete: dist/ ready for CDK deployment"
          else
            echo "::warning::Frontend package.json not found, skipping build"
          fi

      - name: Re-authenticate with AWS before deployment
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422940799530:role/batbern-production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production (Blue/Green)
        working-directory: ./infrastructure
        run: |
          if [ -f "package.json" ]; then
            echo "Deploying version: ${{ github.event.inputs.version }}"

            # CDK deployment with blue-green strategy
            npm run deploy:prod -- \
              --context version=${{ github.event.inputs.version }} \
              --context deploymentStrategy=blue-green \
              --require-approval never
          else
            echo "::warning::Infrastructure not configured yet"
          fi
        env:
          IMAGE_TAG: ${{ github.event.inputs.version }}

      - name: Wait for ECS services to stabilize
        run: |
          if aws ecs describe-clusters --clusters batbern-prod --region ${{ env.AWS_REGION }} 2>/dev/null; then
            services=(
              "event-management-service"
              "speaker-coordination-service"
              "partner-coordination-service"
              "attendee-experience-service"
              "company-user-management-service"
            )

            for service in "${services[@]}"; do
              if aws ecs describe-services --cluster batbern-prod --services ${service} --region ${{ env.AWS_REGION }} 2>/dev/null | grep -q "ACTIVE"; then
                echo "Waiting for $service to stabilize..."
                aws ecs wait services-stable \
                  --cluster batbern-prod \
                  --services ${service} \
                  --region ${{ env.AWS_REGION }} \
                  --max-attempts 40 \
                  --delay 30 || echo "::warning::Service ${service} not found or not stable"
              fi
            done
          else
            echo "::warning::ECS cluster batbern-prod not found yet"
          fi

  smoke-tests:
    needs: blue-green-deployment
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke tests
        id: smoke-tests
        run: |
          if [ -f "scripts/ci/smoke-tests.sh" ]; then
            chmod +x scripts/ci/smoke-tests.sh
            ./scripts/ci/smoke-tests.sh \
              https://www.batbern.ch \
              https://api.batbern.ch
          else
            echo "::warning::Smoke tests script not found"
          fi

      - name: Run CORS validation tests
        run: |
          if [ -f "scripts/ci/cors-validation-tests.sh" ]; then
            chmod +x scripts/ci/cors-validation-tests.sh
            echo "Running CORS validation tests..."
            ./scripts/ci/cors-validation-tests.sh \
              https://api.batbern.ch \
              https://www.batbern.ch || echo "::warning::CORS validation tests not fully configured yet"
            echo "✅ CORS validation tests passed"
          else
            echo "::warning::CORS validation tests script not found"
          fi

      - name: Run header propagation tests
        run: |
          if [ -f "scripts/ci/header-propagation-tests.sh" ]; then
            chmod +x scripts/ci/header-propagation-tests.sh
            echo "Running header propagation tests..."
            ./scripts/ci/header-propagation-tests.sh \
              https://api.batbern.ch || echo "::warning::Header propagation tests not fully configured yet"
            echo "✅ Header propagation tests passed"
          else
            echo "::warning::Header propagation tests script not found"
          fi

      - name: Run Bruno API contract tests
        run: |
          if [ -f "scripts/ci/run-bruno-tests.sh" ]; then
            chmod +x scripts/ci/run-bruno-tests.sh
            echo "Running Bruno API contract tests..."
            ./scripts/ci/run-bruno-tests.sh production || echo "::warning::Bruno tests not fully configured"
            echo "✅ Bruno API contract tests completed"
          else
            echo "::warning::Bruno test script not found, skipping"
          fi

      - name: Verify critical endpoints
        run: |
          endpoints=(
            "https://api.batbern.ch/health"
            "https://api.batbern.ch/actuator/health"
            "https://www.batbern.ch"
          )

          for endpoint in "${endpoints[@]}"; do
            echo "Testing endpoint: $endpoint"
            response=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" || echo "000")
            if [ "$response" != "200" ]; then
              echo "::warning::Endpoint $endpoint returned $response instead of 200"
            else
              echo "✅ Endpoint $endpoint is healthy"
            fi
          done

  e2e-infrastructure-tests:
    needs: blue-green-deployment
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422940799530:role/batbern-production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install infrastructure dependencies
        working-directory: ./infrastructure
        run: npm ci

      - name: Run E2E infrastructure tests
        working-directory: ./infrastructure
        run: |
          echo "Running E2E tests against deployed production infrastructure..."
          TEST_E2E=true TEST_ENVIRONMENT=production npm test -- test/e2e/
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

  e2e-frontend-tests:
    needs: blue-green-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required for checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web-frontend
        run: npm ci

      - name: Install Playwright
        working-directory: ./web-frontend
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run frontend E2E tests (Playwright)
        working-directory: ./web-frontend
        run: |
          echo "Running Playwright E2E tests against production environment..."
          npx playwright test --project=chromium
        env:
          E2E_BASE_URL: https://www.batbern.ch
          E2E_API_URL: https://api.batbern.ch
          E2E_AWS_REGION: ${{ env.AWS_REGION }}

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-production
          path: web-frontend/playwright-report/
          retention-days: 30

  create-release:
    needs: [smoke-tests, e2e-infrastructure-tests, e2e-frontend-tests]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create git tags and GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          RELEASE_NAME="${{ github.event.inputs.release_name }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Use provided release name as tag if given, otherwise fall back to prod/<sha>
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "${RELEASE_NAME}" ]; then
            TAG="${RELEASE_NAME}"
            TITLE="${RELEASE_NAME} — Production (${DATE})"
            NOTES=$(printf '**Version:** `%s`\n**Commit:** `%s`\n**Deployed:** %s\n**Workflow:** %s' \
              "${RELEASE_NAME}" "${VERSION}" "${DATE}" "${WORKFLOW_URL}")
          else
            TAG="prod/${VERSION}"
            TITLE="Production release ${VERSION} (${DATE})"
            NOTES=$(printf '**Commit:** `%s`\n**Deployed:** %s\n**Workflow:** %s' \
              "${VERSION}" "${DATE}" "${WORKFLOW_URL}")
          fi

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "${NOTES}" \
            --target "${VERSION}"

          echo "✅ GitHub Release created: ${TAG}"

  rollback-on-failure:
    needs: [blue-green-deployment, smoke-tests, e2e-infrastructure-tests, e2e-frontend-tests]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422940799530:role/batbern-production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback deployment
        run: |
          echo "🚨 Deployment failed, initiating rollback..."

          if aws ecs describe-clusters --clusters batbern-prod --region ${{ env.AWS_REGION }} 2>/dev/null; then
            services=(
              "event-management-service"
              "speaker-coordination-service"
              "partner-coordination-service"
              "attendee-experience-service"
              "company-user-management-service"
            )

            # Get previous task definition for each service
            for service in "${services[@]}"; do
              if aws ecs describe-services --cluster batbern-prod --services ${service} --region ${{ env.AWS_REGION }} 2>/dev/null | grep -q "ACTIVE"; then
                echo "Rolling back $service..."

                previous_task=$(aws ecs describe-services \
                  --cluster batbern-prod \
                  --services ${service} \
                  --region ${{ env.AWS_REGION }} \
                  --query 'services[0].deployments[1].taskDefinition' \
                  --output text 2>/dev/null || echo "")

                if [ -n "$previous_task" ] && [ "$previous_task" != "None" ]; then
                  aws ecs update-service \
                    --cluster batbern-prod \
                    --service ${service} \
                    --task-definition $previous_task \
                    --force-new-deployment \
                    --region ${{ env.AWS_REGION }}
                  echo "✅ Rolled back $service to $previous_task"
                else
                  echo "⚠️  Could not find previous task definition for $service"
                fi
              fi
            done
          else
            echo "::warning::ECS cluster batbern-prod not found"
          fi

      - name: Notify team
        if: always()
        run: |
          echo "🚨 Production deployment FAILED and rolled back"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Database backup: ${{ needs.backup-database.outputs.snapshot_id }}"
          echo "Action required: Review logs and investigate failure"
