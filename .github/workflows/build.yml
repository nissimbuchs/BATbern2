name: Build Pipeline

# IMPLEMENTATION ORDER AND PROGRESSIVE ENHANCEMENT:
# This pipeline uses a progressive enhancement approach to support incremental development.
# Services are implemented in stages:
#   1. shared-kernel (foundation) - IMPLEMENTED
#   2. api-gateway (routing layer) - IMPLEMENTED
#   3. Domain microservices (event-management, speaker-coordination, etc.) - IN PROGRESS
#   4. web-frontend (user interface) - PLANNED
#
# The pipeline gracefully handles missing services/features:
# - Services are checked for existence before building
# - Missing services show warnings but don't fail the pipeline
# - This allows the pipeline to be active during incremental development
#
# When adding new services:
# - Place microservices in services/{service-name}/
# - Place api-gateway in api-gateway/
# - Each service needs gradlew and build.gradle with JaCoCo configuration
# - Add service name to build-services matrix strategy below

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual trigger'

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: '188701360969'
  ECR_REGISTRY: 188701360969.dkr.ecr.eu-central-1.amazonaws.com
  ENVIRONMENT: staging

jobs:
  # ═══════════════════════════════════════════════════════════
  # BUILD PHASE: Shared Kernel (Foundation)
  # ═══════════════════════════════════════════════════════════
  build-shared-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build and test shared kernel with coverage
        run: |
          chmod +x gradlew
          # Build from root to use monorepo settings.gradle (consistent with other services)
          # 'check' task includes: build, test, jacocoTestReport, and jacocoTestCoverageVerification
          # Will fail automatically if coverage falls below threshold
          ./gradlew :shared-kernel:clean :shared-kernel:check --no-daemon

      - name: Publish shared kernel artifact
        run: ./gradlew :shared-kernel:publishToMavenLocal --no-daemon

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: shared-kernel/build/reports/jacoco/test/jacocoTestReport.xml
          flags: shared-kernel
          token: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  # BUILD PHASE: Domain Services (Parallel)
  # ═══════════════════════════════════════════════════════════
  build-services:
    needs: build-shared-kernel
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checkout
      deployments: read  # Required for deployment tracking
    strategy:
      matrix:
        service:
          - event-management-service
          - speaker-coordination-service
          - partner-coordination-service
          - attendee-experience-service
          - company-user-management-service
          - api-gateway
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git diff

      - name: Detect if service should be built
        id: should-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine base and head SHA for comparison
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PRs: compare against base branch (existing behavior)
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "📌 PR: comparing $BASE_SHA → $HEAD_SHA"
          else
            # Push events: compare against last successful deployment
            chmod +x ./scripts/ci/deployment-tracking.sh

            # Get last deployed commit for staging (target environment)
            LAST_DEPLOYED=$(./scripts/ci/deployment-tracking.sh staging get-last-deployed || echo "")

            if [ -n "$LAST_DEPLOYED" ]; then
              BASE_SHA="$LAST_DEPLOYED"
              echo "✅ Comparing against last successful deployment: $BASE_SHA"
            else
              BASE_SHA="${{ github.event.before }}"
              echo "⚠️  No deployment history found, comparing against previous commit: $BASE_SHA"
            fi

            HEAD_SHA="${{ github.sha }}"
            echo "📊 Change detection: $BASE_SHA → $HEAD_SHA"
          fi

          # Ensure the base commit is available in the local checkout
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "⚠️  Base commit $BASE_SHA not in local checkout, attempting to fetch more history..."
            # Fetch more commits from develop branch (can't fetch by SHA directly)
            git fetch --deepen=100 origin develop 2>/dev/null || echo "::warning::Could not deepen history"

            # Check again if base commit is now available
            if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
              echo "::warning::Base commit $BASE_SHA still not found after deepening history"
              echo "::warning::This may happen if the commit is very old or on a different branch"
            else
              echo "✅ Successfully fetched base commit"
            fi
          fi

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA 2>/dev/null || echo "")

          # If we can't get diff (e.g., first push), build everything
          if [ -z "$CHANGED_FILES" ]; then
            echo "⚠️  Cannot determine changed files, will build all services"
            echo "build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine service directory
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            SERVICE_DIR="api-gateway"
          else
            SERVICE_DIR="services/${{ matrix.service }}"
          fi

          # Check if we should build this service
          SHOULD_BUILD="false"

          # Build if infrastructure changed (deploy will deploy all)
          if echo "$CHANGED_FILES" | grep -qE "^infrastructure/(lib/stacks|bin)/|^infrastructure/package"; then
            echo "✓ Infrastructure changes detected - building all services"
            SHOULD_BUILD="true"
          # Build if shared-kernel changed (deploy will deploy all)
          elif echo "$CHANGED_FILES" | grep -q "^shared-kernel/"; then
            echo "✓ Shared kernel changes detected - building all services"
            SHOULD_BUILD="true"
          # Build if this specific service changed
          elif echo "$CHANGED_FILES" | grep -q "^${SERVICE_DIR}/"; then
            echo "✓ Service ${{ matrix.service }} changes detected"
            SHOULD_BUILD="true"
          else
            echo "ℹ️  No changes detected for ${{ matrix.service }}, skipping build"
            SHOULD_BUILD="false"
          fi

          echo "build=$SHOULD_BUILD" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        if: steps.should-build.outputs.build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Determine service directory
        if: steps.should-build.outputs.build == 'true'
        id: service-dir
        run: |
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            echo "dir=api-gateway" >> $GITHUB_OUTPUT
          else
            echo "dir=services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Check if service exists
        if: steps.should-build.outputs.build == 'true'
        id: check-service
        run: |
          if [ -d "${{ steps.service-dir.outputs.dir }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Service directory ${{ steps.service-dir.outputs.dir }} does not exist yet"
          fi

      - name: Build and test service with coverage
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true'
        run: |
          chmod +x gradlew
          # Build from root to resolve shared-kernel dependency
          # Tests use Testcontainers PostgreSQL for production parity
          # AWS services (EventBridge, S3) are mocked via TestAwsConfig
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            ./gradlew :api-gateway:clean :api-gateway:build :api-gateway:test --no-daemon
          else
            ./gradlew :services:${{ matrix.service }}:clean :services:${{ matrix.service }}:build :services:${{ matrix.service }}:test --no-daemon
          fi

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true'
        run: |
          # Generate version tag
          VERSION="${GITHUB_SHA:0:7}"
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            VERSION="${VERSION}-staging.${GITHUB_RUN_NUMBER}"
          fi

          # ECR repository path format: batbern/staging/service-name
          ECR_REPO="${{ env.ECR_REGISTRY }}/batbern/${{ env.ENVIRONMENT }}/${{ matrix.service }}"
          echo "Building image: ${ECR_REPO}:${VERSION}"

          # Use Docker build with Dockerfile (supports ARM64 via buildx)
          # Build for linux/arm64 to match ECS Fargate ARM64 architecture
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            DOCKERFILE_PATH="api-gateway/Dockerfile"
          else
            DOCKERFILE_PATH="services/${{ matrix.service }}/Dockerfile"
          fi

          docker buildx build \
            --platform linux/arm64 \
            --tag ${ECR_REPO}:${VERSION} \
            --file ${DOCKERFILE_PATH} \
            --load \
            .

      - name: Configure AWS credentials
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::188701360969:role/batbern-staging-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request')
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request')
        run: |
          # Generate version tag
          VERSION="${GITHUB_SHA:0:7}"
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            VERSION="${VERSION}-staging.${GITHUB_RUN_NUMBER}"
          fi

          # ECR repository path format: batbern/staging/service-name
          ECR_REPO="${{ env.ECR_REGISTRY }}/batbern/${{ env.ENVIRONMENT }}/${{ matrix.service }}"
          echo "Pushing image: ${ECR_REPO}:${VERSION}"
          docker push ${ECR_REPO}:${VERSION}

          # Tag and push as latest for the branch
          if [ "$GITHUB_REF" = "refs/heads/develop" ]; then
            docker tag ${ECR_REPO}:${VERSION} ${ECR_REPO}:latest
            docker push ${ECR_REPO}:latest
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            docker tag ${ECR_REPO}:${VERSION} ${ECR_REPO}:latest-production
            docker push ${ECR_REPO}:latest-production
          fi

      - name: Configure AWS credentials (Production)
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422940799530:role/batbern-production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR (Production)
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to production ECR
        if: steps.should-build.outputs.build == 'true' && steps.check-service.outputs.exists == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION="${GITHUB_SHA:0:7}"
          STAGING_REPO="${{ env.ECR_REGISTRY }}/batbern/${{ env.ENVIRONMENT }}/${{ matrix.service }}"
          PROD_REGISTRY="422940799530.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          PROD_REPO="${PROD_REGISTRY}/batbern/production/${{ matrix.service }}"

          echo "Promoting ${STAGING_REPO}:${VERSION} → ${PROD_REPO}:${VERSION}"
          docker tag ${STAGING_REPO}:${VERSION} ${PROD_REPO}:${VERSION}
          docker push ${PROD_REPO}:${VERSION}

  # ═══════════════════════════════════════════════════════════
  # BUILD PHASE: Frontend Application
  # ═══════════════════════════════════════════════════════════
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to enable git diff between commits

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -d "web-frontend" ] && [ -f "web-frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Frontend directory does not exist yet"
          fi

      - name: Detect frontend changes
        id: frontend-changes
        run: |
          # For PR events, compare against base branch
          # For push events, compare against previous commit
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # For push events, compare with previous commit
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "Comparing $BASE_SHA...$HEAD_SHA"

          # Ensure the base commit is available in the local checkout
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "⚠️  Base commit $BASE_SHA not in local checkout, attempting to fetch more history..."
            # Fetch more commits from develop branch (can't fetch by SHA directly)
            git fetch --deepen=100 origin develop 2>/dev/null || echo "::warning::Could not deepen history"

            # Check again if base commit is now available
            if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
              echo "::warning::Base commit $BASE_SHA still not found after deepening history"
              echo "::warning::This may happen if the commit is very old or on a different branch"
            else
              echo "✅ Successfully fetched base commit"
            fi
          fi

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA 2>/dev/null || echo "")

          # If we can't get diff (e.g., first push), build everything
          if [ -z "$CHANGED_FILES" ]; then
            echo "⚠️  Cannot determine changed files, will build frontend"
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if frontend files changed
          if echo "$CHANGED_FILES" | grep -q "^web-frontend/"; then
            echo "✓ Frontend changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  No frontend changes detected, skipping build"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js 20
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true'
        working-directory: ./web-frontend
        run: npm ci

      - name: Verify API types are up-to-date
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true'
        working-directory: ./web-frontend
        run: |
          # Generate types in a temp location
          npm run generate:api-types
          # Check if generated types differ from committed types
          if ! git diff --quiet src/types/generated/; then
            echo "❌ ERROR: Generated API types are out of date!"
            echo "The OpenAPI spec was changed but types were not regenerated."
            echo ""
            echo "To fix this, run locally:"
            echo "  cd web-frontend"
            echo "  npm run generate:api-types"
            echo "  git add src/types/generated/"
            echo "  git commit -m 'chore: regenerate API types from OpenAPI spec'"
            echo ""
            git diff src/types/generated/
            exit 1
          fi
          echo "✅ API types are up-to-date"

      - name: Run linter
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true'
        working-directory: ./web-frontend
        run: npm run lint:ci

      - name: Run tests with coverage
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true'
        working-directory: ./web-frontend
        run: npm test -- --coverage --run
        # Coverage threshold enforced: 80% for statements
        # Configured in vite.config.ts - tests will fail if coverage drops below threshold

      - name: Build frontend
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true'
        working-directory: ./web-frontend
        run: npm run build  # Run full build including TypeScript checking
        env:
          VITE_API_URL: https://api.batbern.ch

      - name: Upload build artifacts
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: web-frontend/dist/
          retention-days: 7

      - name: Upload coverage reports
        if: steps.check-frontend.outputs.exists == 'true' && steps.frontend-changes.outputs.changed == 'true' && always()
        uses: codecov/codecov-action@v4
        with:
          files: web-frontend/coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  # CODE QUALITY ANALYSIS: SonarCloud Multi-Module Scan
  # ═══════════════════════════════════════════════════════════
  # Note: Integration tests are run as part of the build-services job above
  # Each service runs './gradlew test' which includes both unit and integration tests
  # ═══════════════════════════════════════════════════════════
  sonarcloud:
    name: SonarCloud Analysis
    needs: [build-shared-kernel, build-services, build-frontend]
    runs-on: ubuntu-latest
    # Skip SonarCloud for Dependabot PRs (they don't have access to secrets)
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis relevancy

      - name: Detect which modules changed
        id: detect-changes
        run: |
          # Determine base and head SHA for comparison
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # Ensure the base commit is available in the local checkout
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "⚠️  Base commit $BASE_SHA not in local checkout, attempting to fetch more history..."
            # Fetch more commits from develop branch (can't fetch by SHA directly)
            git fetch --deepen=100 origin develop 2>/dev/null || echo "::warning::Could not deepen history"

            # Check again if base commit is now available
            if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
              echo "::warning::Base commit $BASE_SHA still not found after deepening history"
              echo "::warning::This may happen if the commit is very old or on a different branch"
            else
              echo "✅ Successfully fetched base commit"
            fi
          fi

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA 2>/dev/null || echo "")

          # If we can't get diff, analyze everything
          if [ -z "$CHANGED_FILES" ]; then
            echo "⚠️  Cannot determine changed files, will analyze all modules"
            echo "analyze_all=true" >> $GITHUB_OUTPUT
            echo "modules=shared-kernel,api-gateway,event-management-service,attendee-experience-service,company-user-management-service,partner-coordination-service,speaker-coordination-service,web-frontend" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine what changed
          ANALYZE_ALL="false"
          CHANGED_SERVICES=""

          # If infrastructure or shared-kernel changed, analyze everything
          if echo "$CHANGED_FILES" | grep -qE "^infrastructure/(lib/stacks|bin)/|^infrastructure/package|^shared-kernel/"; then
            echo "✓ Infrastructure or shared-kernel changes detected - analyzing all modules"
            ANALYZE_ALL="true"
          fi

          # If only CI/docs/workflow files changed, skip SonarCloud entirely
          if ! echo "$CHANGED_FILES" | grep -qE "^(shared-kernel|api-gateway|services|web-frontend)/"; then
            echo "ℹ️  Only CI/docs/workflow files changed - skipping SonarCloud analysis"
            echo "analyze_all=false" >> $GITHUB_OUTPUT
            echo "modules=" >> $GITHUB_OUTPUT
            echo "skip_analysis=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Detect which services changed
          MODULES="shared-kernel"  # Always include shared-kernel

          if echo "$CHANGED_FILES" | grep -q "^api-gateway/"; then
            MODULES="$MODULES,api-gateway"
            CHANGED_SERVICES="$CHANGED_SERVICES api-gateway"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/event-management-service/"; then
            MODULES="$MODULES,event-management-service"
            CHANGED_SERVICES="$CHANGED_SERVICES event-management-service"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/speaker-coordination-service/"; then
            MODULES="$MODULES,speaker-coordination-service"
            CHANGED_SERVICES="$CHANGED_SERVICES speaker-coordination-service"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/partner-coordination-service/"; then
            MODULES="$MODULES,partner-coordination-service"
            CHANGED_SERVICES="$CHANGED_SERVICES partner-coordination-service"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/attendee-experience-service/"; then
            MODULES="$MODULES,attendee-experience-service"
            CHANGED_SERVICES="$CHANGED_SERVICES attendee-experience-service"
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/company-user-management-service/"; then
            MODULES="$MODULES,company-user-management-service"
            CHANGED_SERVICES="$CHANGED_SERVICES company-user-management-service"
          fi

          if echo "$CHANGED_FILES" | grep -q "^web-frontend/"; then
            MODULES="$MODULES,web-frontend"
            CHANGED_SERVICES="$CHANGED_SERVICES web-frontend"
          fi

          # If analyze all, include all modules
          if [ "$ANALYZE_ALL" = "true" ]; then
            MODULES="shared-kernel,api-gateway,event-management-service,attendee-experience-service,company-user-management-service,partner-coordination-service,speaker-coordination-service,web-frontend"
          fi

          echo "analyze_all=$ANALYZE_ALL" >> $GITHUB_OUTPUT
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "changed_services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT
          echo "skip_analysis=false" >> $GITHUB_OUTPUT

          echo ""
          echo "📊 SonarCloud Analysis Plan:"
          echo "  Analyze All: $ANALYZE_ALL"
          echo "  Modules: $MODULES"
          echo "  Changed Services: ${CHANGED_SERVICES:-none}"

      # ─────────────────────────────────────────────────────────
      # Java Setup & Coverage Generation
      # ─────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build shared-kernel and generate coverage
        if: steps.detect-changes.outputs.skip_analysis != 'true'
        run: |
          chmod +x gradlew
          # Build from root to use monorepo settings.gradle (consistent with other services)
          # (GitHub Actions jobs are isolated - build artifacts from build-shared-kernel job aren't available here)
          ./gradlew :shared-kernel:clean :shared-kernel:compileJava :shared-kernel:test :shared-kernel:jacocoTestReport --no-daemon

      - name: Build api-gateway and generate coverage
        if: steps.detect-changes.outputs.skip_analysis != 'true' && contains(steps.detect-changes.outputs.modules, 'api-gateway')
        run: |
          chmod +x gradlew
          echo "Building api-gateway (changed or analyze_all=true)..."
          ./gradlew :api-gateway:clean :api-gateway:compileJava :api-gateway:test :api-gateway:jacocoTestReport --no-daemon

      - name: Build services and generate coverage
        if: steps.detect-changes.outputs.skip_analysis != 'true'
        run: |
          chmod +x gradlew
          # Only build services that changed (or all if analyze_all=true)
          MODULES="${{ steps.detect-changes.outputs.modules }}"

          for service in event-management-service attendee-experience-service company-user-management-service partner-coordination-service speaker-coordination-service; do
            # Check if this service is in the modules list
            if echo "$MODULES" | grep -q "$service"; then
              if [ -d "services/$service" ]; then
                echo "✓ Building services/$service (changed or analyze_all=true)..."
                ./gradlew :services:$service:clean :services:$service:compileJava :services:$service:test :services:$service:jacocoTestReport --no-daemon
              else
                echo "::warning::Service $service does not exist yet, skipping"
              fi
            else
              echo "ℹ️  Skipping services/$service (no changes detected)"
            fi
          done

      # ─────────────────────────────────────────────────────────
      # Frontend Setup & Coverage Generation
      # ─────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install frontend dependencies and generate coverage
        if: steps.detect-changes.outputs.skip_analysis != 'true' && contains(steps.detect-changes.outputs.modules, 'web-frontend')
        working-directory: ./web-frontend
        run: |
          echo "✓ Building web-frontend (changed or analyze_all=true)..."
          npm ci
          npm test -- --coverage --run || echo "::warning::Frontend tests failed or not configured"

      # ─────────────────────────────────────────────────────────
      # SonarCloud Scan
      # ─────────────────────────────────────────────────────────
      - name: Cache SonarCloud packages
        if: steps.detect-changes.outputs.skip_analysis != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud Scan
        if: steps.detect-changes.outputs.skip_analysis != 'true'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Note: sonar-project.properties contains full multi-module configuration
          # Override modules based on what changed
          args: >
            -Dsonar.projectKey=nissimbuchs_BATbern2
            -Dsonar.organization=nissimbuchs
            -Dsonar.modules=${{ steps.detect-changes.outputs.modules }}
            -Dsonar.verbose=true

  # ═══════════════════════════════════════════════════════════
  # DEPLOYMENT: Trigger staging deployment after successful build
  # ═══════════════════════════════════════════════════════════
  deploy-to-staging:
    needs: [build-shared-kernel, build-services, build-frontend, sonarcloud]
    # Deploy to staging on: (1) push to develop OR (2) PR to develop
    # This allows testing PRs in staging environment before merge
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'develop')
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      deployments: write  # Required for deployment tracking in called workflow
