# <!-- Powered by BMAD™ Core -->
qa:
  qaLocation: docs/qa
prd:
  prdFile: docs/prd-enhanced.md
  prdVersion: v4
  prdSharded: true
  prdShardedLocation: docs/prd
  epicFilePattern: epic-{n}*.md
architecture:
  architectureFile: docs/architecture.md
  architectureVersion: v4
  architectureSharded: true
  architectureShardedLocation: docs/architecture
customTechnicalDocuments: null
devLoadAlwaysFiles:
  - docs/architecture/coding-standards.md
  - docs/architecture/tech-stack.md
  - docs/architecture/source-tree.md
  - docs/templates/README.md
devDebugLog: .ai/debug-log.md
devStoryLocation: docs/stories
slashPrefix: BMad

# Linear Integration
linear:
  enabled: true
  team: BATbern
  teamId: 978bcf9f-669c-464b-a0a4-a162072e575c
  autoSyncOnStoryCreate: true
  postQaToLinear: true
  issuePrefix: BAT
  linearIsSourceOfTruth: true  # When true: Linear has product view (story/AC/tasks), local files have only dev notes
  statusMapping:
    Draft: Backlog
    InProgress: In Progress
    Review: In Review
    Done: Done
    Accepted: Done

# Template Library
templates:
  location: docs/templates
  indexFile: docs/templates/README.md
  categories:
    - backend
    - frontend
    - infrastructure
  extractionMinLines: 50

bugs:
  system: github-issues
  labels:
    bug: bug
    acceptanceTesting: acceptance-testing
    severityCritical: severity:critical
    severityHigh: severity:high
    severityMedium: severity:medium
    severityLow: severity:low
  autoProcessOnStoryComplete: true
  autoCloseIssues: true
  maxAutoFixAttempts: 3
