      - "services/event-management-service/src/main/resources/db/migration/V19__add_speaker_status_history_table.sql:16-25"
      - "services/event-management-service/src/main/java/ch/batbern/events/converter/SpeakerWorkflowStateConverter.java (Story 5.3 solution)"

  - id: "PERF-001"
    severity: high
    finding: "SpeakerStatusService.getStatusSummary() calls repository.findAll() which loads ENTIRE speaker_status_history table into memory instead of querying by event_code"
    suggested_action: "Add repository method: findByEventCode(String eventCode) and use it instead of findAll()"
    refs:
      - "services/speaker-coordination-service/src/main/java/ch/batbern/speakers/service/SpeakerStatusService.java:141"

