  - id: "IMPL-002"
    severity: medium
    finding: "Min/max speaker counts hardcoded (DEFAULT_MIN_SPEAKERS=6, DEFAULT_MAX_SPEAKERS=8) instead of loading from Event entity slot_configuration"
    suggested_action: "Load min/max from Event entity: event.getSlotConfiguration().getMinSlots() / getMaxSlots()"
    refs:
