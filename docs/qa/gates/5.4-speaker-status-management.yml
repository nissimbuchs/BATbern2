    severity: high
    finding: "Enum storage mismatch - Java uses @Enumerated(STRING) which stores UPPERCASE (e.g., 'IDENTIFIED'), but migration CHECK constraints expect lowercase_with_underscores (e.g., 'identified'). Story 5.3 solved this with SpeakerWorkflowStateConverter (@Converter(autoApply=true)) but Story 5.4 does NOT use the converter"
