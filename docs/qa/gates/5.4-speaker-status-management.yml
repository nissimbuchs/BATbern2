      - "services/event-management-service/src/main/java/ch/batbern/events/service/SpeakerOutreachService.java (Story 5.3 reference)"

  - id: "DOC-001"
    severity: low
    finding: "Terminology inconsistency - Story uses 'OPEN' state in AC12 and Technical Design, but implementation uses 'IDENTIFIED'. Frontend comments mention 'OPEN' but code uses 'IDENTIFIED'"
    suggested_action: "Update story documentation to consistently use 'IDENTIFIED' instead of 'OPEN', or explain the terminology mapping"
    refs:
