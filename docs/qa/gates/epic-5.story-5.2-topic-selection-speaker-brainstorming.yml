  - id: "TECH-DEBT-001"
    severity: medium
    finding: "JSON parsing via string manipulation instead of Jackson ObjectMapper"
    impact: "Fragile code, difficult to maintain, prone to parsing errors, violates Spring Boot best practices"
    suggested_action: "Replace string parsing with @RequestBody TopicFilterRequest DTO using Jackson deserialization"
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/controller/TopicController.java:64-72"
    suggested_owner: "dev"

  - id: "TECH-DEBT-002"
    severity: medium
    finding: "In-memory pagination in TopicController (loads all topics, then slices in memory)"
    impact: "O(n) memory usage, inefficient for large datasets (>1000 topics), slow response times"
    suggested_action: "Use Spring Data JPA Pageable with database-level pagination (LIMIT/OFFSET)"
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/controller/TopicController.java:78-83"
    suggested_owner: "dev"

  - id: "COMP-001"
    severity: medium
    finding: "OpenAPI specification incomplete - topic CRUD endpoints not documented"
    impact: "API contract incomplete, frontend type generation may drift from backend implementation"
    suggested_action: "Update docs/api/events-api.openapi.yml with GET/POST /api/v1/topics, TopicResponse/TopicRequest schemas"
    refs:
      - "docs/api/events-api.openapi.yml"
    suggested_owner: "dev"

  - id: "TECH-DEBT-003"
    severity: medium
    finding: "Audit logging missing for staleness overrides (AC7)"
    impact: "No accountability for manual overrides, compliance risk for governance requirements"
    suggested_action: "Create StalenessOverrideAudit entity with organizer, timestamp, justification fields"
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/service/TopicService.java:150"
    suggested_owner: "dev"

  - id: "FEAT-001"
    severity: low
    finding: "Heat map visualization (AC2) not implemented - deferred to future story"
    impact: "Organizers miss visual staleness insights, relies on numeric score only"
    suggested_action: "Implement Recharts heat map component showing usage over 24 months (quarters/years)"
    refs:
      - "docs/stories/5.2-topic-selection-speaker-brainstorming.md:AC2"
    suggested_owner: "po"

  - id: "FEAT-002"
    severity: low
    finding: "Domain events not published (TopicSelectedEvent, SpeakerAddedToPoolEvent)"
    impact: "No cross-service notifications, manual event coordination required, EventBridge unused"
    suggested_action: "Implement DomainEventPublisher from shared-kernel for event publishing"
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/service/TopicService.java:297"
    suggested_owner: "dev"

