  - id: "TEST-002"
    severity: high
    finding: "Backend test failures: 2 of 18 tests failing (11% failure rate)"
    impact: "Incomplete implementation - similarity calculation type mismatch, override endpoint returns 404"
    suggested_action: "Fix type casting in similarity test (Double vs BigDecimal), debug override endpoint routing issue"
    refs:
      - "services/event-management-service/src/test/java/ch/batbern/events/controller/TopicControllerIntegrationTest.java:should_calculateSimilarityScore_when_twoTopicsCompared"
