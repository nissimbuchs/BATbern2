notes: |
  This story demonstrates good engineering in many areas (Vite config, lazy loading, skeletons),
  but has critical flaws that must be addressed:

  1. SECURITY: XSS vulnerability in error handling (CRITICAL)
  2. MAINTAINABILITY: Unnecessary code duplication (CRITICAL)
  3. VALIDATION: Core performance ACs not validated (HIGH)
  4. TESTING: No tests for critical error handling (HIGH)

  The shared ErrorBoundary component already exists with:
  - XSS protection (sanitizeErrorMessage)
  - Comprehensive tests (18 test cases, 325 lines)
  - Better error logging (correlation IDs)
  - Custom fallback support
  - ARIA accessibility attributes

  Recommendation: Revert ErrorBoundary changes, use shared component, validate performance metrics.
