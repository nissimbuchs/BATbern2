waiver:
  active: false

top_issues:
  - id: "SEC-001"
    severity: high
    status: RESOLVED
    finding: "No rate limiting on public anonymous registration endpoints"
    resolution: "Implemented RateLimitFilter with Caffeine cache: 10 req/min per IP. Auto-registered with @Order(Integer.MIN_VALUE) for highest precedence."
    resolved_by: "James (Dev)"
    resolved_date: "2025-11-08"
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/filter/RateLimitFilter.java"

  - id: "VALID-001"
    severity: medium
    status: RESOLVED
    finding: "Missing duplicate registration prevention - same email can register multiple times for same event"
    resolution: "Added business logic check in RegistrationService using existsByEventIdAndAttendeeUsername(). Returns HTTP 409 Conflict for duplicates."
    resolved_by: "James (Dev)"
    resolved_date: "2025-11-08"
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/service/RegistrationService.java:81-89"
      - "services/event-management-service/src/main/java/ch/batbern/events/repository/RegistrationRepository.java:40"
      - "services/event-management-service/src/test/java/ch/batbern/events/controller/RegistrationControllerIntegrationTest.java:366"

  - id: "VALID-002"
    severity: medium
    status: RESOLVED
    finding: "Limited input validation on email format and potential SQL injection vectors"
    resolution: "Verified @Email and @NotBlank validation already present. JPA parameterized queries prevent SQL injection. Added IllegalStateException handler."
    resolved_by: "James (Dev)"
    resolved_date: "2025-11-08"
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/dto/CreateRegistrationRequest.java:34"
      - "services/event-management-service/src/main/java/ch/batbern/events/exception/GlobalExceptionHandler.java:239"

  - id: "RESIL-001"
    severity: medium
    status: OPEN
    finding: "No circuit breaker or fallback for User Management Service calls - service outage would block all registrations"
    suggested_action: "Consider implementing Resilience4j circuit breaker with graceful degradation"
    suggested_owner: dev
    refs:
      - "services/event-management-service/src/main/java/ch/batbern/events/client/impl/UserApiClientImpl.java"
    notes: "Low priority - acceptable for current scale. Monitor service availability and consider for future enhancement."

  - id: "DEFER-001"
    severity: low
    status: DEFERRED
    finding: "Task B12 (Email confirmation service) deferred - users won't receive confirmation emails"
    suggested_action: "Implement email service before production or clearly communicate to users that confirmation is pending"
    suggested_owner: dev

  - id: "DEFER-002"
    severity: low
    status: DEFERRED
    finding: "Task A7 (User Management Service integration tests) deferred - only mocked tests exist"
    suggested_action: "Add real integration tests for User Management Service anonymous user flow before production"
    suggested_owner: dev

