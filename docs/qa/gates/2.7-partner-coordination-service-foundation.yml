architecture_compliance:
  adr_003_meaningful_ids:
    status: PASS
    notes: |
      - Partner stores companyName (VARCHAR(12)), NOT companyId UUID ✅
      - PartnerContact stores username (VARCHAR(100)), NOT userId UUID ✅
      - HTTP clients call Company/User services with meaningful IDs ✅
      - No cross-service database foreign keys ✅
      - JWT token propagation properly implemented ✅

  adr_004_user_field_factoring:
    status: PASS
    notes: |
      - PartnerContact does NOT duplicate email, name, profilePictureUrl fields ✅
      - User data fetched via HTTP enrichment when needed ✅
      - Single source of truth maintained (User Service) ✅

  adr_006_openapi_code_generation:
    status: PASS
    notes: |
      - OpenAPI spec at docs/api/partners-api.openapi.yml (source of truth) ✅
      - Generated interfaces: PartnersApi, PartnerContactsApi, TopicVotingApi ✅
      - Controllers implement generated interfaces ✅
      - Shared-kernel types properly imported (ErrorResponse, PaginationMetadata) ✅
      - Build fails if implementation doesn't match spec ✅

