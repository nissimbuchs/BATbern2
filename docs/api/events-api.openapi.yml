    CreateSessionRequest:
      type: object
      description: |
        Create session request - supports creating placeholder sessions.

        **Placeholder Sessions**: Omit sessionType/startTime/endTime to create a placeholder.
        Timing will be assigned later during slot assignment workflow (Story 5.7).

        **Full Sessions**: Provide all fields to create a fully-defined session.
      required:
        - title
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        sessionType:
          type: string
          nullable: true
          description: Session type - omit for placeholder sessions
          enum: [keynote, presentation, workshop, panel_discussion, networking, break, lunch, moderation]
        startTime:
          type: string
          format: date-time
          nullable: true
          description: Session start time - omit for placeholder sessions
        endTime:
          type: string
          format: date-time
          nullable: true
          description: Session end time - omit for placeholder sessions
        room:
          type: string
          maxLength: 100
        capacity:
          type: integer
        language:
          type: string
          maxLength: 10
          default: de

    UpdateSessionRequest:
      type: object
      description: |
        Update session request - supports partial updates and slot assignment.

        **Slot Assignment**: Update only startTime/endTime/room to assign timing to placeholder session.
        **Full Update**: Update any combination of fields.
        **Clear Timing**: Set startTime/endTime/room to null to revert to placeholder.
      required:
        - title
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        sessionType:
          type: string
          nullable: true
          description: Session type - can be null for placeholder sessions
          enum: [keynote, presentation, workshop, panel_discussion, networking, break, lunch, moderation]
        startTime:
          type: string
          format: date-time
          nullable: true
          description: Session start time - use for slot assignment, set to null to clear
        endTime:
          type: string
          format: date-time
          nullable: true
          description: Session end time - use for slot assignment, set to null to clear
        room:
          type: string
          maxLength: 100
          nullable: true
          description: Session room - assigned during slot assignment
        capacity:
          type: integer
        language:
          type: string
          maxLength: 10

    CreateRegistrationRequest:
      type: object
      description: |
        Story 4.1.5a: Event registration request (ADR-006)
        Public endpoint - no authentication required.
        Creates user_profile with cognito_user_id = NULL for anonymous users.
      required:
        - email
        - firstName
        - lastName
        - termsAccepted
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Email address for registration and confirmation
          example: john.doe@example.com
        firstName:
          type: string
          minLength: 1
          maxLength: 255
          description: First name
          example: John
        lastName:
          type: string
          minLength: 1
          maxLength: 255
          description: Last name
          example: Doe
        company:
          type: string
          maxLength: 255
          description: Company name (optional)
          example: Acme Corp
        role:
          type: string
          maxLength: 255
          description: Job title/role (optional)
          example: Software Architect
        termsAccepted:
          type: boolean
          description: User must accept terms and conditions
          example: true
        communicationPreferences:
          type: object
          description: Email communication preferences
          properties:
            newsletterSubscribed:
              type: boolean
              default: false
              description: Subscribe to newsletter
            eventReminders:
              type: boolean
              default: true
              description: Receive event reminders
        specialRequests:
          type: string
          description: Dietary preferences, accessibility needs, etc.
          example: Vegetarian meal preference

    PatchRegistrationRequest:
      type: object
      description: |
        Story 4.1.5a/4.1.6: Update registration details
        Public endpoint - uses confirmation code for access
      properties:
        specialRequests:
          type: string
          description: Update dietary preferences, accessibility needs, etc.
          example: Vegan meal preference, wheelchair accessible seating
        communicationPreferences:
          type: object
          description: Update email communication preferences
          properties:
            newsletterSubscribed:
              type: boolean
              description: Subscribe to newsletter
            eventReminders:
              type: boolean
              description: Receive event reminders

    BatchRegistrationRequest:
      type: object
      description: |
        Story BAT-12: Batch registration request for historical data import.
        Creates multiple event registrations for a single participant.
      required:
        - participantEmail
        - firstName
        - lastName
        - registrations
      properties:
        participantEmail:
          type: string
          format: email
          maxLength: 255
          description: Participant email (used for user lookup/creation)
          example: "adrian.buerki@centrisag.ch"
        firstName:
          type: string
          maxLength: 100
          description: Participant first name
          example: "Adrian"
        lastName:
          type: string
          maxLength: 100
          description: Participant last name
          example: "Bürki"
        companyId:
          type: string
          maxLength: 100
          description: |
            Company identifier (company name).
            Optional for participants without company affiliation.
            Story 3.2: Batch import includes company information from CSV.
          example: "Centris AG"
        registrations:
          type: array
          minItems: 1
          maxItems: 100
          description: Array of event registrations (max 100 per batch)
          items:
            $ref: '#/components/schemas/BatchRegistrationItem'

    BatchRegistrationItem:
      type: object
      description: Single event registration within a batch
      required:
        - eventCode
        - status
      properties:
        eventCode:
          type: string
          pattern: '^BATbern\d+$'
          description: Event code in format BATbernN where N is event number
          example: "BATbern25"
        status:
          type: string
          enum: [REGISTERED, ATTENDED, CANCELLED]
          description: Registration status (use 'ATTENDED' for historical data)
          example: "ATTENDED"

    BatchRegistrationResponse:
      type: object
      description: |
        Response for batch registration operation.
        Returns partial success - some registrations may fail while others succeed.
      required:
        - username
        - totalRegistrations
        - successfulRegistrations
        - failedRegistrations
        - errors
      properties:
        username:
          type: string
          description: Username of created/found participant
          example: "adrian.buerki"
        totalRegistrations:
          type: integer
          description: Total number of registrations attempted
          example: 3
        successfulRegistrations:
          type: integer
          description: Number of registrations successfully created
          example: 3
        failedRegistrations:
          type: array
          description: List of registrations that failed
          items:
            $ref: '#/components/schemas/FailedRegistration'
        errors:
          type: array
          description: List of error messages
          items:
            type: string
          example: ["Event BATbern99 not found"]

    FailedRegistration:
      type: object
      description: Details of a failed registration within a batch
      required:
        - eventCode
        - reason
      properties:
        eventCode:
          type: string
          description: Event code that failed
          example: "BATbern99"
        reason:
          type: string
          description: Reason for failure
          example: "Event not found"

    BatchUpdateRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              fields:
                type: object

    BatchUpdateResponse:
      type: object
      properties:
        successful:
          type: integer
          example: 45
        failed:
          type: integer
          example: 5
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              error:
                type: string

    EventAnalytics:
      type: object
      properties:
        eventCode:
          type: string
          pattern: '^BATbern[0-9]+$'
          example: BATbern142
          description: Event code in format BATbern{number} (Story 1.16.2)
        totalRegistrations:
          type: integer
        confirmedAttendees:
          type: integer
        cancellations:
          type: integer
        waitlist:
          type: integer
        registrationTrend:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer

    EventType:
      type: string
      description: |
        Event type identifier (Story 5.1 - Event Type Definition).
        Matches EventType enum from architecture (03-data-architecture.md:547-551).
      enum:
        - FULL_DAY
        - AFTERNOON
        - EVENING
      example: FULL_DAY

    EventSlotConfigurationResponse:
      type: object
      description: |
        Event slot configuration for an event type (Story 5.1).
        Defines slot requirements and scheduling parameters.
      required:
        - type
        - minSlots
        - maxSlots
        - slotDuration
        - theoreticalSlotsAM
        - breakSlots
        - lunchSlots
        - defaultCapacity
        - typicalStartTime
        - typicalEndTime
      properties:
        type:
          $ref: '#/components/schemas/EventType'
        minSlots:
          type: integer
          minimum: 1
          description: Minimum number of session slots
