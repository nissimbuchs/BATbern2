        Confirms a speaker's arrival for the given event.
        Idempotent: confirming an already-arrived speaker is a no-op (UNIQUE DB constraint).
        Also triggers real-time WebSocket broadcast to all organizer watches.

        **REST Fallback**: Used when WebSocket is offline/reconnecting.
        **Story W2.4**: Speaker Arrival Tracking — FR38 (sync within 3 seconds).
        **Authorization**: Requires `ROLE_ORGANIZER` JWT claim.
      operationId: confirmSpeakerArrival
      parameters:
        - name: eventCode
          in: path
          required: true
          schema:
            type: string
          example: "BATbern56"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmArrivalRequest'
      responses:
        '201':
          description: Arrival confirmed — includes broadcast payload with server-authoritative counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerArrivalBroadcast'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - BearerAuth: []

  # ── Email Templates (Story 10.2) ──────────────────────────────────────────

  /email-templates:
    get:
      tags:
        - Email Templates
      summary: List email templates
      description: |
        Returns all email templates with optional filtering by category and layout flag.

        **Story**: 10.2 - Email Template Management
        **Authorization**: ORGANIZER role required.
      operationId: listEmailTemplates
      parameters:
        - name: category
          in: query
          required: false
          description: Filter by category (SPEAKER, REGISTRATION, TASK_REMINDER, LAYOUT)
          schema:
            type: string
            enum: [SPEAKER, REGISTRATION, TASK_REMINDER, LAYOUT]
        - name: isLayout
          in: query
          required: false
          description: Filter to layout templates only (true) or content templates only (false)
          schema:
            type: boolean
      responses:
        '200':
          description: List of email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailTemplateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - BearerAuth: []

    post:
      tags:
        - Email Templates
      summary: Create a custom email template
      description: |
        Creates a new custom (non-system) email template.

        **Story**: 10.2 - Email Template Management
        **Authorization**: ORGANIZER role required.
      operationId: createEmailTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmailTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Template with this key and locale already exists
      security:
        - BearerAuth: []

  /email-templates/{templateKey}/{locale}:
    get:
      tags:
        - Email Templates
      summary: Get a single email template
      description: |
        Returns a single email template by key and locale.

        **Story**: 10.2 - Email Template Management
        **Authorization**: ORGANIZER role required.
      operationId: getEmailTemplate
      parameters:
        - name: templateKey
          in: path
          required: true
          description: Template key (e.g. speaker-invitation, batbern-default)
          schema:
            type: string
        - name: locale
          in: path
          required: true
          description: Locale (de or en)
          schema:
            type: string
      responses:
        '200':
          description: Email template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

    put:
      tags:
        - Email Templates
      summary: Update an email template
      description: |
        Updates subject, htmlBody and/or layoutKey of an existing template.

        **Story**: 10.2 - Email Template Management
        **Authorization**: ORGANIZER role required.
      operationId: updateEmailTemplate
      parameters:
        - name: templateKey
          in: path
          required: true
          description: Template key
          schema:
            type: string
        - name: locale
          in: path
          required: true
          description: Locale (de or en)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailTemplateRequest'
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

    delete:
      tags:
        - Email Templates
      summary: Delete a custom email template
      description: |
        Deletes a custom (non-system) email template. Returns 400 for system or layout templates.

        **Story**: 10.2 - Email Template Management
        **Authorization**: ORGANIZER role required.
      operationId: deleteEmailTemplate
      parameters:
        - name: templateKey
          in: path
          required: true
          description: Template key
          schema:
            type: string
        - name: locale
          in: path
          required: true
          description: Locale (de or en)
          schema:
            type: string
      responses:
        '204':
          description: Template deleted
        '400':
          description: Cannot delete system or layout templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - BearerAuth: []

components:
  schemas:

    # ── Email Template Schemas (Story 10.2) ──────────────────────────────────

    EmailTemplateResponse:
      type: object
      description: Email template with full content and metadata
      required:
        - templateKey
        - locale
        - category
        - htmlBody
        - isLayout
        - isSystemTemplate
        - updatedAt
      properties:
        templateKey:
          type: string
          description: Template identifier key (e.g. speaker-invitation, batbern-default)
        locale:
          type: string
          description: Locale code (de or en)
        category:
          type: string
          description: Template category
          enum: [SPEAKER, REGISTRATION, TASK_REMINDER, LAYOUT]
        subject:
          type: string
          nullable: true
          description: Email subject line (null for layout templates)
          maxLength: 500
        htmlBody:
          type: string
          description: HTML body content
        variables:
          type: object
          nullable: true
          description: Available template variables (JSONB)
          additionalProperties: true
        isLayout:
          type: boolean
          description: True if this is a layout (shell) template
        layoutKey:
          type: string
          nullable: true
          description: Key of the layout template to use (null for standalone or layout templates)
        isSystemTemplate:
          type: boolean
          description: True if this is a built-in system template (cannot be deleted)
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    CreateEmailTemplateRequest:
      type: object
      description: Request to create a custom email template
      required:
        - templateKey
        - locale
        - category
        - htmlBody
      properties:
        templateKey:
          type: string
          description: Unique template key
          maxLength: 100
        locale:
          type: string
          description: Locale code (de or en)
          maxLength: 5
        category:
          type: string
          description: Template category
          enum: [SPEAKER, REGISTRATION, TASK_REMINDER, LAYOUT]
        subject:
          type: string
          nullable: true
          description: Email subject (required for content templates, null for layout)
          maxLength: 500
        htmlBody:
          type: string
          description: HTML body content
        variables:
          type: object
          nullable: true
          description: Available template variables
          additionalProperties: true
        isLayout:
          type: boolean
          description: Whether this is a layout template
          default: false
        layoutKey:
          type: string
          nullable: true
          description: Layout template key to use (e.g. batbern-default)
          maxLength: 100

    UpdateEmailTemplateRequest:
      type: object
      description: Request to update an existing email template
      properties:
        subject:
          type: string
          nullable: true
          description: Updated subject line (null for layout templates)
          maxLength: 500
        htmlBody:
          type: string
          description: Updated HTML body
        layoutKey:
          type: string
          nullable: true
          description: Updated layout key (null = standalone)
          maxLength: 100

    # ── Partner Analytics Schemas (Story 8.1) ────────────────────────────────

    AttendanceSummaryDTO:
      type: object
      description: Per-event attendance summary for a given company (Story 8.1)
      required:
        - eventCode
        - eventDate
        - totalAttendees
        - companyAttendees
      properties:
        eventCode:
          type: string
          description: Event code (e.g. 'BATbern142')
          example: BATbern142
        eventDate:
          type: string
          format: date-time
          description: Event date (ISO-8601)
        totalAttendees:
          type: integer
          format: int64
          description: Total confirmed attendees for this event
        companyAttendees:
          type: integer
          format: int64
          description: Confirmed attendees from the queried company

    # ── Timetable Schemas ────────────────────────────────────────────────────

    TimetableSlot:
      type: object
      description: |
        A single slot in the event timetable. SPEAKER_SLOT entries represent droppable
        speaker positions (the implicit gaps between structural sessions). All other types
        map to persisted structural sessions (moderation, break, lunch).
      required:
        - type
        - startTime
        - endTime
      properties:
        type:
          type: string
          enum: [MODERATION, BREAK, LUNCH, SPEAKER_SLOT]
          description: Slot type — determines rendering and whether the slot is droppable
          example: SPEAKER_SLOT
        startTime:
          type: string
          format: date-time
          description: Slot start time (UTC ISO-8601)
          example: "2025-06-15T07:05:00Z"
        endTime:
          type: string
          format: date-time
          description: Slot end time (UTC ISO-8601)
          example: "2025-06-15T07:50:00Z"
        title:
          type: string
          nullable: true
          description: Human-readable label for structural slots; null for SPEAKER_SLOT
          example: "Kaffee-Pause"
        slotIndex:
          type: integer
          nullable: true
          description: >
            1-based global index for SPEAKER_SLOT entries across the full event day
            (never reset when switching AM → PM block). Null for structural slots.
          example: 1
        sessionSlug:
          type: string
          nullable: true
          description: >
            Session slug of the structural DB session occupying this slot.
            Null when no structural sessions have been generated yet, or for SPEAKER_SLOT.
          example: "moderation-start-abc"
        assignedSessionSlug:
          type: string
          nullable: true
          description: >
            Session slug of the speaker session assigned to this SPEAKER_SLOT.
            Null if the slot is free, or for structural slots.
          example: "speaker-xyz"

    TimetableResponse:
      type: object
      description: Full timetable for an event including slot grid and unassigned sessions.
      required:
        - slots
        - unassignedSessions
      properties:
        slots:
          type: array
          description: All slots in chronological order (structural and speaker slots interleaved)
          items:
            $ref: '#/components/schemas/TimetableSlot'
        unassignedSessions:
          type: array
          description: Speaker sessions (non-structural) with no startTime assigned yet
          items:
            $ref: '#/components/schemas/SessionResponse'

    # ── Watch App Schemas (W2.4) ─────────────────────────────────────────────

    ConfirmArrivalRequest:
      type: object
      description: Request body to confirm a speaker's arrival.
      required:
        - speakerUsername
      properties:
        speakerUsername:
          type: string
          example: "anna.meier"

    ArrivalStatusList:
      type: object
      description: List of confirmed speaker arrivals for an event.
      required:
        - arrivals
      properties:
        arrivals:
          type: array
          items:
            $ref: '#/components/schemas/ArrivalStatus'

    ArrivalStatus:
      type: object
      description: A single speaker arrival record.
      required:
        - speakerUsername
        - confirmedBy
        - arrivedAt
      properties:
        speakerUsername:
          type: string
          example: "anna.meier"
        confirmedBy:
          type: string
          example: "marco.muster"
        arrivedAt:
          type: string
          format: date-time
          example: "2026-02-16T17:15:00Z"

    ArrivalCount:
      type: object
      description: Server-authoritative arrived/total counts for real-time counter sync.
      required:
        - arrived
        - total
      properties:
        arrived:
          type: integer
          example: 2
        total:
          type: integer
          example: 4

    SpeakerArrivalBroadcast:
      type: object
      description: |
        WebSocket broadcast payload sent to `/topic/events/{eventCode}/arrivals`.
        Also returned as REST response body for the POST endpoint.
        Carries individual arrival details plus server-authoritative counts (FR39).
      required:
        - type
        - eventCode
        - speakerUsername
        - confirmedBy
        - arrivedAt
        - arrivalCount
      properties:
        type:
          type: string
          enum: ["SPEAKER_ARRIVED"]
          example: "SPEAKER_ARRIVED"
        eventCode:
          type: string
          example: "BATbern56"
        speakerUsername:
          type: string
          example: "anna.meier"
        speakerFirstName:
          type: string
          example: "Anna"
        speakerLastName:
          type: string
          example: "Meier"
        confirmedBy:
          type: string
          example: "marco.muster"
        arrivedAt:
          type: string
          format: date-time
          example: "2026-02-16T17:15:00Z"
        arrivalCount:
          $ref: '#/components/schemas/ArrivalCount'

    # ── Watch App Schemas (W2.3) ─────────────────────────────────────────────

    ActiveEventsResponse:
      type: object
      description: Response wrapper for the organizer's active events (W2.3).
      required:
        - activeEvents
      properties:
        activeEvents:
          type: array
          items:
            $ref: '#/components/schemas/ActiveEventDetail'

    ActiveEventDetail:
      type: object
      description: Full event detail for Watch organizer sync, including sessions and speakers.
      required:
        - eventCode
        - title
        - eventDate
        - venueName
        - eventStatus
        - sessions
      properties:
        eventCode:
          type: string
          example: "BATbern57"
        title:
          type: string
          example: "BATbern 57 - Cloud Native Architectures"
        eventDate:
          type: string
          format: date
          example: "2026-03-01"
        venueName:
          type: string
          example: "Kultur Casino Bern"
        typicalStartTime:
          type: string
          nullable: true
          description: "HH:mm in Europe/Zurich timezone, derived from first session"
          example: "18:00"
        typicalEndTime:
          type: string
          nullable: true
          description: "HH:mm in Europe/Zurich timezone, derived from last session"
          example: "22:00"
        themeImageUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/theme/batbern57.jpg"
        currentPublishedPhase:
          type: string
          nullable: true
          example: "AGENDA"
        eventStatus:
          type: string
          enum: [SCHEDULED, LIVE, COMPLETED]
          example: "SCHEDULED"
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/WatchSessionDetail'

    WatchSessionDetail:
      type: object
      description: Session detail for Watch organizer sync.
      required:
        - sessionSlug
        - title
        - speakers
      properties:
        sessionSlug:
          type: string
          example: "cloud-keynote"
        title:
          type: string
          example: "Cloud Architecture Keynote"
        abstract:
          type: string
          nullable: true
        sessionType:
          type: string
          nullable: true
          example: "talk"
        scheduledStartTime:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-01T17:00:00Z"
        scheduledEndTime:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-01T17:45:00Z"
        durationMinutes:
          type: integer
          nullable: true
          example: 45
        speakers:
          type: array
          items:
            $ref: '#/components/schemas/WatchSpeakerDetail'
        status:
          type: string
          nullable: true
          enum: [SCHEDULED, ACTIVE, COMPLETED]
          description: Derived from timing relative to now; W4 adds real-time override.
          example: "SCHEDULED"
        actualStartTime:
          type: string
          format: date-time
          nullable: true
          description: Populated in W4 (session control). Always null in W2.3.
        actualEndTime:
          type: string
          format: date-time
          nullable: true
          description: Populated in W4 (session control). Always null in W2.3.
        overrunMinutes:
          type: integer
          description: Populated in W4. Always 0 in W2.3.
          example: 0
        completedBy:
          type: string
          nullable: true
          description: Populated in W4. Always null in W2.3.

    WatchSpeakerDetail:
      type: object
      description: Speaker detail for Watch organizer sync.
      required:
        - username
      properties:
        username:
          type: string
          example: "john.doe"
        firstName:
          type: string
          nullable: true
          example: "John"
        lastName:
          type: string
          nullable: true
          example: "Doe"
        company:
          type: string
          nullable: true
          description: Cross-service lookup deferred. Always null in W2.3.
        companyLogoUrl:
          type: string
          nullable: true
          description: Cross-service lookup deferred. Always null in W2.3.
        profilePictureUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/portrait/john.doe.jpg"
        bio:
          type: string
          nullable: true
          example: "Cloud architect with 10 years experience"
        speakerRole:
          type: string
          nullable: true
          example: "panelist"

    # ── Core Schemas ────────────────────────────────────────────────────────

    Event:
      type: object
      required:
        - eventCode
        - title
        - eventNumber
        - date
        - registrationDeadline
        - venueName
        - venueAddress
        - venueCapacity
        - organizerUsername
      properties:
        eventCode:
          type: string
          pattern: '^BATbern[0-9]+$'
          example: BATbern142
          description: |
            Human-readable event identifier in format "BATbern{number}".
            Story 1.16.2: Public API uses meaningful IDs, not UUIDs.
        title:
          type: string
          maxLength: 255
          example: Spring Conference 2025
        eventNumber:
          type: integer
          example: 142
          description: Sequential event number (e.g., BATbern #142)
        date:
          type: string
          format: date-time
          example: 2025-05-15T09:00:00Z
          description: Event date
        registrationDeadline:
          type: string
          format: date-time
          example: 2025-05-01T23:59:59Z
        venueName:
          type: string
          maxLength: 255
          example: Kursaal Bern
        venueAddress:
          type: string
          example: Kornhausstrasse 3, 3013 Bern
        venueCapacity:
          type: integer
          example: 500
        organizerUsername:
          type: string
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          example: john.doe
          description: |
            Username of the event organizer in format "firstname.lastname" or "firstname.lastname.2" for collisions.
            Story 1.16.2: Public API uses meaningful IDs (usernames), not UUIDs.
        currentAttendeeCount:
          type: integer
          example: 0
          default: 0
        publishedAt:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: string
          description: JSONB metadata
          example: '{"theme":"cloud-native","category":"technology"}'
        description:
          type: string
          example: Cloud Native Architecture and Best Practices
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        themeImageUrl:
          type: string
          nullable: true
          format: uri
          maxLength: 1000
          example: "https://d123456.cloudfront.net/logos/2025/events/BATbern57/theme-abc123.png"
          description: |
            CloudFront URL for event theme image.
            Story 2.5.3a: Event Theme Image Upload
        themeImageUploadId:
          type: string
          nullable: true
          maxLength: 100
          example: "abc123-def456"
          description: |
            Upload ID from three-phase upload pattern (internal reference).
            Story 2.5.3a: Event Theme Image Upload
            This is returned so the frontend can track what was uploaded.
        topicCode:
          type: string
          nullable: true
          pattern: '^[a-z0-9-]+$'
          description: |
            Topic code (slug-format identifier) of the selected topic.
            Story 5.2: Topic Selection & Speaker Brainstorming
            ADR-003: Meaningful Identifiers - use topicCode instead of UUID
          example: 'cloud-native-security-2024'
        eventType:
          $ref: '#/components/schemas/EventType'
          description: |
            Event type (FULL_DAY, AFTERNOON, EVENING).
            Story 5.1: Event Type Definition
        typicalStartTime:
          type: string
          format: time
          description: |
            Typical start time for this event type (from event_types table).
            Combined with event date for display purposes.
          example: "09:00"
        typicalEndTime:
          type: string
          format: time
          description: |
            Typical end time for this event type (from event_types table).
            Combined with event date for display purposes.
          example: "16:00"
        workflowState:
          $ref: '#/components/schemas/EventWorkflowState'
          description: |
            Current workflow state (16-step workflow).
            Story 5.1a: Event Workflow State Machine
        # Optional resource expansion fields (Story BAT-109: Archive Browsing)
        # These fields are populated only when requested via ?include parameter
        topic:
          type: object
          nullable: true
          description: |
            Expanded topic details (only included when ?include=topics).
            Story BAT-109: Archive browsing with topic expansion
          properties:
            code:
              type: string
              example: "cloud-native-security-2024"
            name:
              type: string
              example: "Cloud Native Security"
            description:
              type: string
              example: "Security patterns for cloud-native applications"
            category:
              type: string
              enum: [technical, management, soft_skills, industry_trends, tools_platforms]
              example: "technical"
        venue:
          $ref: '#/components/schemas/Venue'
          nullable: true
          description: |
            Expanded venue details (only included when ?include=venue).
            Story BAT-109: Archive browsing with venue expansion
        sessions:
          type: array
          nullable: true
          description: |
            Expanded session list with speakers (only included when ?include=sessions or ?include=speakers).
            Story BAT-109: Archive browsing with session expansion
          items:
            $ref: '#/components/schemas/Session'

    EventDetail:
      allOf:
        - $ref: '#/components/schemas/Event'
        - type: object
          properties:
            venue:
              $ref: '#/components/schemas/Venue'
            sessions:
              type: array
              items:
                $ref: '#/components/schemas/Session'
            currentPublishedPhase:
              type: string
              nullable: true
              enum: [TOPIC, SPEAKERS, AGENDA]
              description: |
                Progressive publishing phase for watch app (Story W1.2)
                - TOPIC: Event topic selected, speakers TBA
                - SPEAKERS: Speaker list published
                - AGENDA: Full session details published

    Venue:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        capacity:
          type: integer

    Speaker:
      type: object
      description: |
        Speaker information (speakers are users per Story 1.16.2)
      properties:
        username:
          type: string
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          example: john.doe
          description: Speaker username in firstname.lastname format (Story 1.16.2)
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: string
        title:
          type: string
        profilePhoto:
          type: string
          format: uri

    Session:
      type: object
      description: |
        Story 1.16.2: Uses sessionSlug and eventCode as meaningful IDs

        **Placeholder Session Pattern (V21):**
        Sessions can be created as placeholders when speakers accept invitations.
        Placeholder sessions have title but null sessionType/startTime/endTime.
        Timing is assigned later during slot assignment workflow (Story 5.7).
      required:
        - sessionSlug
        - eventCode
        - title
      properties:
        sessionSlug:
          type: string
          description: URL-friendly slug generated from session title
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          example: keynote-opening-session
          maxLength: 200
        eventCode:
          type: string
          description: Event code this session belongs to
          pattern: '^BATbern[0-9]+$'
          example: BATbern142
        title:
          type: string
          maxLength: 255
        description:
          type: string
        sessionType:
          type: string
          nullable: true
          description: Session type - null for placeholder sessions, assigned during agenda planning
          enum: [keynote, presentation, workshop, panel_discussion, networking, break, lunch, moderation]
          example: keynote
        startTime:
          type: string
          format: date-time
          nullable: true
          description: Session start time - null for placeholder sessions, assigned during slot assignment
        endTime:
          type: string
          format: date-time
          nullable: true
          description: Session end time - null for placeholder sessions, assigned during slot assignment
        room:
          type: string
          maxLength: 100
          example: Main Hall
        capacity:
          type: integer
          example: 200
        language:
          type: string
          maxLength: 10
          example: de
          default: de
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        speakers:
          type: array
          description: |
            Story 1.15a.1b: Session speakers with enriched User data
            List of speakers assigned to this session with their roles
          items:
            $ref: '#/components/schemas/SessionSpeaker'
        materialsStatus:
          type: string
          description: |
            Material submission workflow status
            - NONE: No materials submitted yet (initial state)
            - pending: Materials submitted, awaiting review
            - in_review: Materials under review
            - approved: Materials approved
            - requires_changes: Materials need changes
            - rejected: Materials rejected
            - revision_submitted: Revised materials submitted
            - COMPLETE: Materials finalized and approved (final state)
          enum: [NONE, pending, in_review, approved, requires_changes, rejected, revision_submitted, COMPLETE]
          example: pending

    SessionSpeaker:
      type: object
      description: |
        Story 1.15a.1b: Session speaker with enriched User data
        Combines SessionUser entity (role, confirmation) with User entity (name, company, photo)
      required:
        - username
        - firstName
        - lastName
        - speakerRole
        - isConfirmed
      properties:
        username:
          type: string
          description: User's username (public identifier from User entity)
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          example: john.doe
          maxLength: 100
        firstName:
          type: string
          description: Speaker's first name (from User entity)
          example: John
          maxLength: 100
        lastName:
          type: string
          description: Speaker's last name (from User entity)
          example: Doe
          maxLength: 100
        company:
          type: string
          description: Speaker's company name (from User.companyId)
          example: GoogleZH
          maxLength: 12
        profilePictureUrl:
          type: string
          format: uri
          description: Speaker's profile picture URL (from User entity)
          example: https://cdn.batbern.ch/logos/2025/users/john.doe/profile.jpg
        bio:
          type: string
          description: Speaker's biography (from User entity)
          maxLength: 2000
          example: Software engineer passionate about cloud architecture and security
        speakerRole:
          type: string
          enum: [PRIMARY_SPEAKER, CO_SPEAKER, MODERATOR, PANELIST]
          description: |
            Speaker's role in the session:
            - PRIMARY_SPEAKER: Main presenter
            - CO_SPEAKER: Co-presenter
            - MODERATOR: Panel moderator
            - PANELIST: Panel participant
          example: PRIMARY_SPEAKER
        presentationTitle:
          type: string
          description: Optional speaker-specific presentation title (if different from session title)
          maxLength: 255
          example: Security Auditing Tools Deep Dive
        isConfirmed:
          type: boolean
          description: Whether speaker has confirmed participation
          example: true

    SessionResponse:
      description: |
        Story 1.15a.1b: Session response with embedded speakers
        Same as Session schema but used specifically for API responses
      allOf:
        - $ref: '#/components/schemas/Session'

    BatchImportSessionRequest:
      type: object
      description: |
        Request payload for batch import from legacy sessions.json.
        Designed for historical data migration from BATspa application.
      required:
        - bat
        - title
      properties:
        bat:
          type: integer
          description: Event number (links to BATbern{bat})
          example: 142
        title:
          type: string
          description: Session title
          maxLength: 255
          example: "User Interface Design"
        abstract:
          type: string
          description: Session abstract/description
          example: "Discussion on modern UI patterns"
        pdf:
          type: string
          description: PDF filename for reference (appended to description)
          example: "BAT142_UI_Design.pdf"
        authoren:
          type: string
          description: Moderator name (for Moderation sessions)
          example: "Thomas Goetz"
        referenten:
          type: array
          description: List of speakers for this session
          items:
            $ref: '#/components/schemas/LegacySpeaker'

    LegacySpeaker:
      type: object
      description: |
        Speaker data from legacy sessions.json.
        speakerId is mapped to username for user lookup.
      properties:
        name:
          type: string
          description: Speaker full name
          example: "Thomas Goetz, Die Mobiliar"
        bio:
          type: string
          description: Speaker biography
        company:
          type: string
          description: Company identifier
          example: "mobiliar"
        portrait:
          type: string
          description: Portrait filename
          example: "thomas.goetz.jpg"
        speakerId:
          type: string
          description: Speaker ID (maps to username in user_profiles)
          example: "thomas.goetz"

    BatchImportSessionResult:
      type: object
      description: |
        Result of batch import operation with success/skip/fail counts.
      required:
        - totalProcessed
        - successfullyCreated
        - skipped
        - failed
        - details
      properties:
        totalProcessed:
          type: integer
          description: Total sessions processed
          example: 3
        successfullyCreated:
          type: integer
          description: Successfully created sessions
          example: 2
        skipped:
          type: integer
          description: Skipped sessions (duplicates)
          example: 1
        failed:
          type: integer
          description: Failed imports
          example: 0
        details:
          type: array
          description: Detailed results per session
          items:
            $ref: '#/components/schemas/SessionImportDetail'

    SessionImportDetail:
      type: object
      description: |
        Detail for a single session import result.
      required:
        - title
        - status
        - message
      properties:
        title:
          type: string
          description: Session title
          example: "User Interface Design"
        status:
          type: string
          enum: [success, skipped, failed]
          description: Import status
          example: "success"
        message:
          type: string
          description: Status message
          example: "Session created successfully"
        sessionSlug:
          type: string
          description: Generated session slug (null if failed)
          nullable: true
          example: "user-interface-design-abc123"

    Registration:
      type: object
      description: |
        Story 4.1.5a: Unified user profile approach for anonymous and authenticated registrations (ADR-006)
        All users (anonymous + authenticated) are in user_profiles table. Anonymous users have cognito_user_id = NULL.
      required:
        - registrationCode
        - eventCode
        - status
        - attendeeUsername
      properties:
        registrationCode:
          type: string
          description: Unique registration code (BAT-YYYY-NNNNNN format) acts as access token
          pattern: '^BAT-[0-9]{4}-[0-9]{6}$'
          example: BAT-2025-000123
        eventCode:
          type: string
          description: Event code this registration belongs to
          pattern: '^BATbern[0-9]+$'
          example: BATbern25
        eventTitle:
          type: string
          description: Event title (included for convenience)
        eventDate:
          type: string
          format: date-time
          description: Event date (included for convenience)

        # User profile reference (unified approach - ADR-006, ADR-003)
        attendeeUsername:
          type: string
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          description: |
            Attendee username from user_profiles (ADR-003: meaningful identifiers in public APIs).
            Format: firstname.lastname or firstname.lastname.2 for duplicates.
            Always present - anonymous users are in user_profiles with cognito_user_id = NULL.
            ADR-006: Unified table eliminates need for separate anonymous_* fields.
          example: john.doe

        # Computed fields from user_profiles
        firstName:
          type: string
          description: First name from user_profiles
        lastName:
          type: string
          description: Last name from user_profiles
        email:
          type: string
          format: email
          description: Email from user_profiles
        company:
          type: string
          description: Company name from user_profiles.company_id (FK to companies table)

        # Registration metadata
        status:
          type: string
          enum: [REGISTERED, WAITLISTED, CONFIRMED, CANCELLED, ATTENDED]
        registrationDate:
          type: string
          format: date-time
        sessionPreferences:
          type: array
          items:
            type: string
          description: Event-level registration - sessions are preferences only, not commitments
        specialRequests:
          type: string
          nullable: true
          description: Dietary preferences, accessibility needs, etc.
        communicationPreferences:
          type: object
          properties:
            newsletterSubscribed:
              type: boolean
              default: false
            eventReminders:
              type: boolean
              default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEventRequest:
      type: object
      required:
        - title
        - eventNumber
        - date
        - registrationDeadline
        - venueName
        - venueAddress
        - venueCapacity
        - organizerUsername
        - eventType
      properties:
