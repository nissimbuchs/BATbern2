  /topics:
    get:
      tags:
        - Topics
      summary: List all topics with filters and pagination
      description: |
        Retrieve topic backlog with optional category and status filters.

        **Story**: 5.2 - Topic Selection & Speaker Brainstorming
        **Acceptance Criteria**: AC1, AC2, AC6
        **Authorization**: Requires ORGANIZER role
        **Performance**: <150ms (P95) with database-level pagination

        **Filtering**:
        - Category filter: `?filter={"category":"technical"}`
        - Status filter: `?filter={"status":"active"}` or `"inactive"`
        - Combined: `?filter={"category":"technical","status":"active"}`

        **Sorting**:
        - Default: staleness score descending (safest topics first)
        - Custom: `?sort=-stalenessScore` or `?sort=stalenessScore,desc`
        - Supports: title, category, stalenessScore, usageCount, createdDate

        **Pagination**:
        - Default: page=1, limit=50
        - Database-level pagination for performance

        **Staleness Zones**:
        - Green (83-100): Safe to use, recommended
        - Yellow (50-82): Use with caution
        - Red (0-49): Too recent, avoid reuse
      operationId: listTopics
      parameters:
        - name: filter
          in: query
          description: JSON filter object
          required: false
          schema:
            type: string
            example: '{"category":"technical","status":"active"}'
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            example: 50
        - name: sort
          in: query
          description: Sort parameter (e.g., "-stalenessScore" or "stalenessScore,desc")
          schema:
            type: string
            example: "-stalenessScore"
        - name: include
          in: query
          description: |
            Comma-separated list of resources to include.
            **GitHub Issue #379**: Added for heatmap visualization support.

            **Supported values**:
            - `history`: Embeds usage history with event details for each topic
            - `similarity`: Recalculates similarity scores on-demand

            **Performance impact**:
            - Without includes: <150ms (P95)
            - With `include=history`: <300ms (P95) - Single JOIN query
            - With `include=similarity`: <500ms (P95) - TF-IDF recalculation
          schema:
            type: string
            example: "history"
          required: false
      responses:
        '200':
          description: Topics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicListResponse'
              example:
                data:
                  - id: "123e4567-e89b-12d3-a456-426614174000"
                    title: "Cloud Native Architecture Patterns"
                    description: "Modern cloud-native design patterns and best practices"
                    category: "technical"
                    createdDate: "2023-01-15T10:00:00Z"
                    lastUsedDate: "2024-03-20T14:30:00Z"
                    usageCount: 3
                    stalenessScore: 92
                    colorZone: "green"
                    status: "available"
                    similarityScores: []
                    active: true
                    createdAt: "2023-01-15T10:00:00Z"
                    updatedAt: "2024-03-20T14:30:00Z"
                pagination:
                  page: 1
                  limit: 50
                  total: 150
        '400':
          description: Invalid filter JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    post:
      tags:
        - Topics
      summary: Create new topic
      description: |
        Add new topic to backlog. Automatically calculates similarity scores.

        **Story**: 5.2 - Topic Selection & Speaker Brainstorming
        **Acceptance Criteria**: AC8
        **Authorization**: Requires ORGANIZER role

        **Automatic Processing**:
        - Staleness score initialized to 100 (safe to use immediately)
        - Similarity scores calculated against all existing topics using TF-IDF
        - Only similarity scores >30% are stored

        **Duplicate Detection**:
        - If similarity >70% to existing topic, warning is flagged
        - Organizer can still create but should review similar topics first
      operationId: createTopic
      requestBody:
        required: true
        content:
          application/json:
            schema:
