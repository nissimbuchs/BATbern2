  /events/{eventCode}/registrations/confirm:
    post:
      tags:
        - Registrations
      summary: Confirm registration via email token
      description: |
        Confirm a registration using the JWT token sent via email.

        **Story**: 4.1.5c - Secure Email-Based Registration Confirmation
        **Security**: Public endpoint - JWT token provides authentication and authorization

        **Token Validation**:
        - JWT signature verified (HMAC-SHA256)
        - Token expiry checked (48 hours from registration)
        - Token type must be "email-confirmation"
        - Registration ID extracted from token claims
        - Event code in URL must match event code in token

        **Idempotency**: Can be called multiple times safely. Already confirmed registrations return 200 OK.

      operationId: confirmRegistration
      security: []  # Public endpoint - JWT token in query param provides security
      parameters:
        - name: eventCode
          in: path
          description: Event code in format BATbernXXX
          required: true
          schema:
            type: string
            pattern: '^BATbern[0-9]+$'
            example: BATbern57
        - name: token
          in: query
          description: JWT confirmation token from email link
          required: true
          schema:
            type: string
            example: eyJhbGciOiJIUzI1NiJ9.eyJyZWdpc3RyYXRpb25JZCI6IjEyMzQ1Njc4LTkwYWItY2RlZi0xMjM0LTU2Nzg5MGFiY2RlZiIsImV2ZW50Q29kZSI6IkJBVGJlcm41NyIsInR5cGUiOiJlbWFpbC1jb25maXJtYXRpb24iLCJpYXQiOjE3MDUwMDAwMDAsImV4cCI6MTcwNTE3MjgwMH0.signature
      responses:
        '200':
          description: Registration confirmed successfully (or already confirmed)
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - status
                properties:
                  message:
                    type: string
                    example: Registration confirmed successfully
                  status:
                    type: string
                    enum: [CONFIRMED]
                    example: CONFIRMED
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                expiredToken:
                  summary: Token expired
                  value:
                    error: Invalid token
                    message: Token has expired (48 hour validity)
                    code: TOKEN_EXPIRED
                invalidToken:
                  summary: Invalid token signature
                  value:
                    error: Invalid token
                    message: Token signature validation failed
                    code: INVALID_TOKEN
        '404':
          description: Registration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: Registration not found
                code: REGISTRATION_NOT_FOUND
        '500':
          $ref: '#/components/responses/InternalServerError'

  /registrations/cancel:
    post:
      tags:
        - Registrations
      summary: Cancel registration via email token
      description: |
        Cancel a registration using the JWT token sent via email.
        Permanently deletes the registration from the database.

        **Story**: Anonymous Cancellation Flow
        **Security**: Public endpoint - JWT token provides authentication and authorization

        **Token Validation**:
        - JWT signature verified (HMAC-SHA256)
        - Token expiry checked (48 hours from registration)
        - Token type must be "registration-cancellation"
        - Registration ID extracted from token claims

        **Deletion**: Permanently removes registration from database. Cannot be undone.

      operationId: cancelRegistration
      security: []  # Public endpoint - JWT token in query param provides security
      parameters:
        - name: token
          in: query
          description: JWT cancellation token from email link
          required: true
          schema:
            type: string
            example: eyJhbGciOiJIUzI1NiJ9.eyJyZWdpc3RyYXRpb25JZCI6IjEyMzQ1Njc4LTkwYWItY2RlZi0xMjM0LTU2Nzg5MGFiY2RlZiIsImV2ZW50Q29kZSI6IkJBVGJlcm41NyIsInR5cGUiOiJyZWdpc3RyYXRpb24tY2FuY2VsbGF0aW9uIiwiaWF0IjoxNzA1MDAwMDAwLCJleHAiOjE3MDUxNzI4MDB9.signature
      responses:
        '200':
          description: Registration cancelled successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - status
                properties:
                  message:
                    type: string
                    example: Registration cancelled successfully
                  status:
                    type: string
                    enum: [CANCELLED]
                    example: CANCELLED
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                expiredToken:
                  summary: Token expired
                  value:
                    error: Invalid token
                    message: Token has expired (48 hour validity)
                    code: TOKEN_EXPIRED
                invalidToken:
                  summary: Invalid token signature
                  value:
                    error: Invalid token
                    message: Token signature validation failed
                    code: INVALID_TOKEN
        '404':
          description: Registration not found or already cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: Registration not found or already cancelled
                code: REGISTRATION_NOT_FOUND
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/batch_registrations:
    post:
      tags:
        - Registrations
      summary: Create batch event registrations for a participant
      description: |
        Creates multiple event registrations for a single participant in one transaction.
        Used for bulk importing historical attendance data.

        **Story**: BAT-12 - API Contract - Participant Batch Registration

        **Behavior**:
        - Creates user if doesn't exist (get-or-create by email)
        - Skips duplicate registrations (idempotent)
        - Returns partial success if some registrations fail

        **Use Case**: Historical data migration for 2,307 participants

        **Performance**: <500ms (P95) for 100 registrations
      operationId: createBatchRegistrations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRegistrationRequest'
            examples:
              historicalAttendee:
                summary: Historical participant with multiple events
                value:
                  participantEmail: "adrian.buerki@centrisag.ch"
                  firstName: "Adrian"
                  lastName: "Bürki"
                  registrations:
                    - eventCode: "BATbern17"
                      status: "ATTENDED"
                    - eventCode: "BATbern25"
                      status: "ATTENDED"
                    - eventCode: "BATbern31"
                      status: "ATTENDED"
              syntheticEmail:
                summary: Participant with synthetic email
                value:
                  participantEmail: "max.muster@batbern.ch"
                  firstName: "Max"
                  lastName: "Muster"
                  registrations:
                    - eventCode: "BATbern1"
                      status: "ATTENDED"
      responses:
        '200':
          description: Batch registrations processed (full or partial success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchRegistrationResponse'
              examples:
                fullSuccess:
                  summary: All registrations successful
                  value:
                    username: "adrian.buerki"
                    totalRegistrations: 3
                    successfulRegistrations: 3
                    failedRegistrations: []
                    errors: []
                partialSuccess:
                  summary: Some registrations failed
                  value:
                    username: "adrian.buerki"
                    totalRegistrations: 3
                    successfulRegistrations: 2
                    failedRegistrations:
                      - eventCode: "BATbern99"
                        reason: "Event not found"
                    errors: ["Event BATbern99 not found"]
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidEmail:
                  summary: Invalid email format
                  value:
                    error: "Validation failed"
                    message: "Invalid email format"
                    code: "VALIDATION_ERROR"
                    details:
                      - field: "participantEmail"
                        message: "must be a well-formed email address"
                emptyRegistrations:
                  summary: Empty registrations array
                  value:
                    error: "Validation failed"
                    message: "Registrations array cannot be empty"
                    code: "VALIDATION_ERROR"
                    details:
                      - field: "registrations"
                        message: "must contain at least 1 item"
                tooManyRegistrations:
                  summary: Too many registrations
                  value:
                    error: "Validation failed"
                    message: "Too many registrations in batch"
                    code: "VALIDATION_ERROR"
                    details:
                      - field: "registrations"
                        message: "must contain at most 100 items"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden - requires ORGANIZER role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Forbidden"
                message: "This operation requires ORGANIZER role"
                code: "INSUFFICIENT_PERMISSIONS"
        '500':
