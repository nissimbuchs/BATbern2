          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        '200':
          description: Similar topics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopicResponse'
              example:
                - id: "789e0123-e89b-12d3-a456-426614174002"
                  title: "Cloud Architecture Best Practices"
                  description: "Cloud-native architectural patterns for modern applications"
                  category: "technical"
                  stalenessScore: 78
                  colorZone: "yellow"
                  status: "caution"
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /topics/{id}/usage-history:
    get:
      tags:
        - Topics
      summary: Get topic usage history
      description: |
        Retrieve the usage history for a specific topic over the last 24 months.

        **Story**: 5.2 - Topic Selection & Speaker Brainstorming
        **Acceptance Criteria**: AC2
        **Authorization**: Requires ORGANIZER role

        **Usage**:
        - Returns historical usage data for heat map visualization
        - Grouped by event with attendance and engagement metrics
        - Used to identify usage patterns and staleness trends

        **Frontend Integration**:
        - Powers the TopicHeatMap component
        - Displays quarterly aggregated usage patterns
        - Helps organizers make informed topic selection decisions
      operationId: getTopicUsageHistory
      parameters:
        - name: id
          in: path
          description: Topic UUID
          required: true
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        '200':
          description: Usage history retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopicUsageHistory'
              example:
                - eventId: "event-abc-123"
                  usedDate: "2024-01-15T10:00:00Z"
                  attendance: 150
                  engagementScore: 0.85
                - eventId: "event-def-456"
                  usedDate: "2024-04-20T10:00:00Z"
                  attendance: 200
                  engagementScore: 0.92
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /topics/recalculate-staleness:
    post:
      tags:
        - Topics
      summary: Recalculate staleness scores for all topics
      description: |
        Maintenance endpoint to recalculate staleness for all topics.

        **Story**: 5.2 - Topic Selection & Speaker Brainstorming
        **Acceptance Criteria**: AC3
        **Authorization**: Requires ORGANIZER role

        **Scheduling**:
        - Should be run periodically (e.g., monthly batch job)
        - Updates staleness based on time since last use
        - Does NOT override manual staleness adjustments

        **Performance**:
        - Runs asynchronously for large backlogs
        - Returns immediately with count of topics queued
      operationId: recalculateTopicStaleness
      responses:
        '200':
          description: Staleness recalculation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Staleness scores recalculated for 150 topics"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /topics/calculate-similarities:
    post:
      tags:
        - Topics
      summary: Calculate similarity scores for all topics
      description: |
        Maintenance endpoint to recalculate TF-IDF similarity matrix.

        **Story**: 5.2 - Topic Selection & Speaker Brainstorming
        **Acceptance Criteria**: AC4
        **Authorization**: Requires ORGANIZER role

        **Use Cases**:
        - Initial data migration
        - After bulk topic imports
        - Periodic refresh of similarity scores

        **Algorithm**:
        - TF-IDF vectorization across all active topics
        - Pairwise cosine similarity calculation
        - Only stores scores >30% to save space

        **Performance**:
        - O(n²) complexity - expensive for large backlogs
        - Should be run during off-peak hours
      operationId: calculateTopicSimilarities
      responses:
        '200':
          description: Similarity calculation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Similarity scores calculated for all topics"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

components:
  schemas:
    Event:
      type: object
      required:
        - eventCode
        - title
        - eventNumber
        - date
        - registrationDeadline
        - venueName
        - venueAddress
        - venueCapacity
        - organizerUsername
      properties:
        eventCode:
          type: string
          pattern: '^BATbern[0-9]+$'
          example: BATbern142
          description: |
            Human-readable event identifier in format "BATbern{number}".
            Story 1.16.2: Public API uses meaningful IDs, not UUIDs.
        title:
          type: string
          maxLength: 255
          example: Spring Conference 2025
        eventNumber:
          type: integer
          example: 142
          description: Sequential event number (e.g., BATbern #142)
        date:
          type: string
          format: date-time
          example: 2025-05-15T09:00:00Z
          description: Event date
        registrationDeadline:
          type: string
          format: date-time
          example: 2025-05-01T23:59:59Z
        venueName:
          type: string
          maxLength: 255
          example: Kursaal Bern
        venueAddress:
          type: string
          example: Kornhausstrasse 3, 3013 Bern
        venueCapacity:
          type: integer
          example: 500
        organizerUsername:
          type: string
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          example: john.doe
          description: |
            Username of the event organizer in format "firstname.lastname" or "firstname.lastname.2" for collisions.
            Story 1.16.2: Public API uses meaningful IDs (usernames), not UUIDs.
        currentAttendeeCount:
          type: integer
          example: 0
          default: 0
        publishedAt:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: string
          description: JSONB metadata
          example: '{"theme":"cloud-native","category":"technology"}'
        description:
          type: string
          example: Cloud Native Architecture and Best Practices
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        themeImageUrl:
          type: string
          nullable: true
          format: uri
          maxLength: 1000
          example: "https://d123456.cloudfront.net/logos/2025/events/BATbern57/theme-abc123.png"
          description: |
            CloudFront URL for event theme image.
            Story 2.5.3a: Event Theme Image Upload
        themeImageUploadId:
          type: string
          nullable: true
          maxLength: 100
          example: "abc123-def456"
          description: |
            Upload ID from three-phase upload pattern (internal reference).
            Story 2.5.3a: Event Theme Image Upload
            This is returned so the frontend can track what was uploaded.
        topicId:
          type: string
          format: uuid
          nullable: true
          description: |
            UUID of the selected topic for this event.
            Story 5.2: Topic Selection & Speaker Brainstorming
          example: "123e4567-e89b-12d3-a456-426614174000"
        eventType:
          $ref: '#/components/schemas/EventType'
          description: |
            Event type (FULL_DAY, AFTERNOON, EVENING).
            Story 5.1: Event Type Definition
        workflowState:
          $ref: '#/components/schemas/EventWorkflowState'
          description: |
            Current workflow state (16-step workflow).
            Story 5.1a: Event Workflow State Machine

    EventDetail:
      allOf:
        - $ref: '#/components/schemas/Event'
        - type: object
          properties:
            venue:
              $ref: '#/components/schemas/Venue'
            speakers:
              type: array
              items:
                $ref: '#/components/schemas/Speaker'
            sessions:
              type: array
              items:
                $ref: '#/components/schemas/Session'

    Venue:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        capacity:
          type: integer

    Speaker:
      type: object
      description: |
        Speaker information (speakers are users per Story 1.16.2)
      properties:
        username:
          type: string
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          example: john.doe
          description: Speaker username in firstname.lastname format (Story 1.16.2)
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: string
        title:
          type: string
        profilePhoto:
          type: string
          format: uri

    Session:
      type: object
      description: |
        Story 1.16.2: Uses sessionSlug and eventCode as meaningful IDs
      required:
        - sessionSlug
        - eventCode
        - title
        - sessionType
        - startTime
        - endTime
      properties:
        sessionSlug:
          type: string
          description: URL-friendly slug generated from session title
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          example: keynote-opening-session
          maxLength: 200
        eventCode:
          type: string
          description: Event code this session belongs to
          pattern: '^BATbern[0-9]+$'
          example: BATbern142
        title:
          type: string
          maxLength: 255
        description:
          type: string
        sessionType:
          type: string
          enum: [keynote, presentation, workshop, panel_discussion, networking, break, lunch]
          example: keynote
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        room:
          type: string
          maxLength: 100
          example: Main Hall
        capacity:
          type: integer
          example: 200
        language:
          type: string
          maxLength: 10
          example: de
          default: de
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        speakers:
          type: array
          description: |
            Story 1.15a.1b: Session speakers with enriched User data
            List of speakers assigned to this session with their roles
          items:
            $ref: '#/components/schemas/SessionSpeaker'
        materialsStatus:
          type: string
          description: |
            Phase 2 Feature: Quality review status for session materials (presentation, bio, photo).
            Based on QualityReviewStatus enum from architecture (03-data-architecture.md:783-790).
          enum: [pending, in_review, approved, requires_changes, rejected, revision_submitted]
          example: pending

    SessionSpeaker:
      type: object
      description: |
        Story 1.15a.1b: Session speaker with enriched User data
        Combines SessionUser entity (role, confirmation) with User entity (name, company, photo)
      required:
        - username
        - firstName
        - lastName
        - speakerRole
        - isConfirmed
      properties:
        username:
          type: string
          description: User's username (public identifier from User entity)
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          example: john.doe
          maxLength: 100
        firstName:
          type: string
          description: Speaker's first name (from User entity)
          example: John
          maxLength: 100
        lastName:
          type: string
          description: Speaker's last name (from User entity)
          example: Doe
          maxLength: 100
        company:
          type: string
          description: Speaker's company name (from User.companyId)
          example: GoogleZH
          maxLength: 12
        profilePictureUrl:
          type: string
          format: uri
          description: Speaker's profile picture URL (from User entity)
          example: https://cdn.batbern.ch/logos/2025/users/john.doe/profile.jpg
        bio:
          type: string
          description: Speaker's biography (from User entity)
          maxLength: 2000
          example: Software engineer passionate about cloud architecture and security
        speakerRole:
          type: string
          enum: [PRIMARY_SPEAKER, CO_SPEAKER, MODERATOR, PANELIST]
          description: |
            Speaker's role in the session:
            - PRIMARY_SPEAKER: Main presenter
            - CO_SPEAKER: Co-presenter
            - MODERATOR: Panel moderator
            - PANELIST: Panel participant
          example: PRIMARY_SPEAKER
        presentationTitle:
          type: string
          description: Optional speaker-specific presentation title (if different from session title)
          maxLength: 255
          example: Security Auditing Tools Deep Dive
        isConfirmed:
          type: boolean
          description: Whether speaker has confirmed participation
          example: true

    SessionResponse:
      description: |
        Story 1.15a.1b: Session response with embedded speakers
        Same as Session schema but used specifically for API responses
      allOf:
        - $ref: '#/components/schemas/Session'

    BatchImportSessionRequest:
      type: object
      description: |
        Request payload for batch import from legacy sessions.json.
        Designed for historical data migration from BATspa application.
      required:
        - bat
        - title
      properties:
        bat:
          type: integer
          description: Event number (links to BATbern{bat})
          example: 142
        title:
          type: string
          description: Session title
          maxLength: 255
          example: "User Interface Design"
        abstract:
          type: string
          description: Session abstract/description
          example: "Discussion on modern UI patterns"
        pdf:
          type: string
          description: PDF filename for reference (appended to description)
          example: "BAT142_UI_Design.pdf"
        authoren:
          type: string
          description: Moderator name (for Moderation sessions)
          example: "Thomas Goetz"
        referenten:
          type: array
          description: List of speakers for this session
          items:
            $ref: '#/components/schemas/LegacySpeaker'

    LegacySpeaker:
      type: object
      description: |
        Speaker data from legacy sessions.json.
        speakerId is mapped to username for user lookup.
      properties:
        name:
          type: string
          description: Speaker full name
          example: "Thomas Goetz, Die Mobiliar"
        bio:
          type: string
          description: Speaker biography
        company:
          type: string
          description: Company identifier
          example: "mobiliar"
        portrait:
          type: string
          description: Portrait filename
          example: "thomas.goetz.jpg"
        speakerId:
          type: string
          description: Speaker ID (maps to username in user_profiles)
          example: "thomas.goetz"

    BatchImportSessionResult:
      type: object
      description: |
        Result of batch import operation with success/skip/fail counts.
      required:
        - totalProcessed
        - successfullyCreated
        - skipped
        - failed
        - details
      properties:
        totalProcessed:
          type: integer
          description: Total sessions processed
          example: 3
        successfullyCreated:
          type: integer
          description: Successfully created sessions
          example: 2
        skipped:
          type: integer
          description: Skipped sessions (duplicates)
          example: 1
        failed:
          type: integer
          description: Failed imports
          example: 0
        details:
          type: array
          description: Detailed results per session
          items:
            $ref: '#/components/schemas/SessionImportDetail'

    SessionImportDetail:
      type: object
      description: |
        Detail for a single session import result.
      required:
        - title
        - status
        - message
      properties:
        title:
          type: string
          description: Session title
          example: "User Interface Design"
        status:
          type: string
          enum: [success, skipped, failed]
          description: Import status
          example: "success"
        message:
          type: string
          description: Status message
          example: "Session created successfully"
        sessionSlug:
          type: string
          description: Generated session slug (null if failed)
          nullable: true
          example: "user-interface-design-abc123"

    Registration:
      type: object
      description: |
        Story 4.1.5a: Unified user profile approach for anonymous and authenticated registrations (ADR-006)
        All users (anonymous + authenticated) are in user_profiles table. Anonymous users have cognito_user_id = NULL.
      required:
        - registrationCode
        - eventCode
        - status
        - attendeeUsername
      properties:
        registrationCode:
          type: string
          description: Unique registration code (BAT-YYYY-NNNNNN format) acts as access token
          pattern: '^BAT-[0-9]{4}-[0-9]{6}$'
          example: BAT-2025-000123
        eventCode:
          type: string
          description: Event code this registration belongs to
          pattern: '^BATbern[0-9]+$'
          example: BATbern25
        eventTitle:
          type: string
          description: Event title (included for convenience)
        eventDate:
          type: string
          format: date-time
          description: Event date (included for convenience)

        # User profile reference (unified approach - ADR-006, ADR-003)
        attendeeUsername:
          type: string
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          description: |
            Attendee username from user_profiles (ADR-003: meaningful identifiers in public APIs).
            Format: firstname.lastname or firstname.lastname.2 for duplicates.
            Always present - anonymous users are in user_profiles with cognito_user_id = NULL.
            ADR-006: Unified table eliminates need for separate anonymous_* fields.
          example: john.doe

        # Computed fields from user_profiles
        firstName:
          type: string
          description: First name from user_profiles
        lastName:
          type: string
          description: Last name from user_profiles
        email:
          type: string
          format: email
          description: Email from user_profiles
        company:
          type: string
          description: Company name from user_profiles.company_id (FK to companies table)

        # Registration metadata
        status:
          type: string
          enum: [registered, waitlisted, confirmed, cancelled, attended]
        registrationDate:
          type: string
          format: date-time
        sessionPreferences:
          type: array
          items:
            type: string
          description: Event-level registration - sessions are preferences only, not commitments
        specialRequests:
          type: string
          nullable: true
          description: Dietary preferences, accessibility needs, etc.
        communicationPreferences:
          type: object
          properties:
            newsletterSubscribed:
              type: boolean
              default: false
            eventReminders:
              type: boolean
              default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEventRequest:
      type: object
      required:
        - title
        - eventNumber
        - date
        - registrationDeadline
        - venueName
        - venueAddress
        - venueCapacity
        - organizerUsername
        - eventType
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        eventNumber:
          type: integer
        date:
          type: string
          format: date-time
        registrationDeadline:
          type: string
          format: date-time
        venueName:
          type: string
          maxLength: 255
        venueAddress:
          type: string
        venueCapacity:
          type: integer
          minimum: 1
        workflowState:
          $ref: '#/components/schemas/EventWorkflowState'
        organizerUsername:
          type: string
          pattern: '^[a-z]+\.[a-z]+(\.[0-9]+)?$'
          example: john.doe
          description: |
            Username of the event organizer in format "firstname.lastname" or "firstname.lastname.2" for collisions.
            Story 1.16.2: Public API uses meaningful IDs (usernames), not UUIDs.
        currentAttendeeCount:
          type: integer
          default: 0
        publishedAt:
          type: string
          format: date-time
        metadata:
          type: string
        description:
          type: string
          maxLength: 5000
        eventType:
          $ref: '#/components/schemas/EventType'
        themeImageUploadId:
          type: string
          nullable: true
          maxLength: 100
          example: "abc123-def456"
          description: |
            Upload ID from /logos/presigned-url for event theme image.
            Story 2.5.3a: Event Theme Image Upload

    UpdateEventRequest:
      type: object
      required:
        - title
        - eventNumber
        - date
        - registrationDeadline
        - venueName
        - venueAddress
        - venueCapacity
        - organizerUsername
        - eventType
      properties:
        title:
          type: string
          maxLength: 200
        eventNumber:
          type: integer
        date:
          type: string
          format: date-time
        registrationDeadline:
          type: string
          format: date-time
        venueName:
          type: string
          maxLength: 255
        venueAddress:
          type: string
        venueCapacity:
          type: integer
