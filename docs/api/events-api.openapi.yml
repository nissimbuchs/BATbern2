            eventReminders:
              type: boolean
              description: Receive event reminders

    BatchUpdateRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              fields:
                type: object

    BatchUpdateResponse:
      type: object
      properties:
        successful:
          type: integer
          example: 45
        failed:
          type: integer
          example: 5
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              error:
                type: string

    EventAnalytics:
      type: object
      properties:
        eventCode:
          type: string
          pattern: '^BATbern[0-9]+$'
          example: BATbern142
          description: Event code in format BATbern{number} (Story 1.16.2)
        totalRegistrations:
          type: integer
        confirmedAttendees:
          type: integer
        cancellations:
          type: integer
        waitlist:
          type: integer
        registrationTrend:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer

    EventType:
      type: string
      description: |
        Event type identifier (Story 5.1 - Event Type Definition).
        Matches EventType enum from architecture (03-data-architecture.md:547-551).
      enum:
        - FULL_DAY
        - AFTERNOON
        - EVENING
      example: FULL_DAY

    EventSlotConfigurationResponse:
      type: object
      description: |
        Event slot configuration for an event type (Story 5.1).
        Defines slot requirements and scheduling parameters.
      required:
        - type
        - minSlots
        - maxSlots
        - slotDuration
        - theoreticalSlotsAM
        - breakSlots
        - lunchSlots
        - defaultCapacity
      properties:
