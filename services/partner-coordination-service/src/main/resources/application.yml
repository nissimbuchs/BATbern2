server:
  port: 8080
  compression:
    enabled: false

spring:
  application:
    name: partner-coordination-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/batbern}
    username: ${DATABASE_USERNAME:batbern}
    password: ${DATABASE_PASSWORD:batbern}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Let Flyway manage schema
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Cache configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

# HTTP Clients for Microservices Communication (ADR-003)
# Service Connect DNS: http://{service-name}:8080
company-service:
  base-url: ${COMPANY_USER_MANAGEMENT_SERVICE_URL:http://company-user-management:8080}

user-service:
  base-url: ${COMPANY_USER_MANAGEMENT_SERVICE_URL:http://company-user-management:8080}

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      companyService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
    build:
      enabled: true

# Application Info (exposed via /actuator/info)
info:
  app:
    name: ${spring.application.name}
    description: Partner Coordination Service
    version: ${build.version:1.0.0}
  build:
    artifact: ${build.artifact:partner-coordination-service}
    version: ${build.version:1.0.0}
    time: ${build.time:unknown}
  git:
    commit:
      id: ${git.commit.id.abbrev:unknown}
      time: ${git.commit.time:unknown}
    branch: ${git.branch:unknown}
