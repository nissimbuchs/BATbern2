# Test configuration for Partner Coordination Service
# Uses PostgreSQL via Testcontainers (configured dynamically by AbstractIntegrationTest)

# PostgreSQL driver and dialect (Testcontainers provides connection details)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Let Flyway manage schema - validate only
spring.jpa.hibernate.ddl-auto=validate

# Enable Flyway migrations for production parity
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA settings for testing
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging for debugging
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.ch.batbern.partners=DEBUG

# HTTP service URLs (mocked via TestConfiguration @MockBean)
services.company-service.url=http://localhost:8081
services.user-service.url=http://localhost:8082
