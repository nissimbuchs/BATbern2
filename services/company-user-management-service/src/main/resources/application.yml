spring:
  application:
    name: company-user-management-service

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/batbern}
    username: ${DATABASE_USERNAME:batbern}
    password: ${DATABASE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false
    table: flyway_schema_history_company_user_management

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=15m
    cache-names:
      - companySearch
      - userSearch

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.${AWS_REGION:eu-central-1}.amazonaws.com/${COGNITO_USER_POOL_ID:}}
          jwk-set-uri: ${COGNITO_JWK_SET_URI:https://cognito-idp.${AWS_REGION:eu-central-1}.amazonaws.com/${COGNITO_USER_POOL_ID:}/.well-known/jwks.json}

# VPC Network Configuration (for service-to-service authentication)
vpc:
  cidr: ${VPC_CIDR:10.1.0.0/16}

# AWS Configuration
aws:
  region: ${AWS_REGION:eu-central-1}
  s3:
    bucket-name: ${S3_CONTENT_BUCKET_NAME:batbern-content-staging}
    profile-pictures-bucket: ${S3_PROFILE_PICTURES_BUCKET_NAME:batbern-profile-pictures-staging}
    presigned-url-expiration-minutes: 15
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:https://cdn.batbern.ch}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID:}
    region: ${AWS_REGION:eu-central-1}
  eventbridge:
    bus-name: ${EVENT_BUS_NAME:batbern-staging}
    source: ch.batbern.companyuser

# Server Configuration
server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: false
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
    build:
      enabled: true

# Application Info (exposed via /actuator/info)
info:
  app:
    name: ${spring.application.name}
    description: Company User Management Service
    version: ${build.version:1.0.0}
  build:
    artifact: ${build.artifact:company-user-management-service}
    version: ${build.version:1.0.0}
    time: ${build.time:unknown}
  git:
    commit:
      id: ${git.commit.id.abbrev:unknown}
      time: ${git.commit.time:unknown}
    branch: ${git.branch:unknown}

# Logging Configuration
logging:
  level:
    root: INFO
    ch.batbern: ${LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: true

---
# Test Profile Configuration
# CRITICAL: Uses PostgreSQL via Testcontainers for production parity (coding-standards.md)
# Never use H2 for integration tests - causes database-specific issues
spring:
  config:
    activate:
      on-profile: test

  datasource:
    # Configured dynamically by AbstractIntegrationTest via @DynamicPropertySource
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/oauth2/default

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m
    cache-names:
      - companySearch
      - userSearch

logging:
  level:
    root: INFO
    ch.batbern: DEBUG
    org.testcontainers: INFO
    com.github.dockerjava: WARN

---
# Staging Profile Configuration
spring:
  config:
    activate:
      on-profile: staging

logging:
  level:
    root: INFO
    ch.batbern: DEBUG

---
# Production Profile Configuration
spring:
  config:
    activate:
      on-profile: production

logging:
  level:
    root: INFO
    ch.batbern: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

---
# Local Profile Configuration (for native development with MinIO)
spring:
  config:
    activate:
      on-profile: local

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:batbern-development-company-logos}
    profile-pictures-bucket: ${S3_PROFILE_PICTURES_BUCKET_NAME:batbern-development-profile-pictures}
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:http://localhost:8450}

logging:
  level:
    root: INFO
    ch.batbern: DEBUG
