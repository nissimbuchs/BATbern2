server:
  port: 8080
  compression:
    enabled: false

spring:
  application:
    name: attendee-experience-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
    build:
      enabled: true

# Application Info (exposed via /actuator/info)
info:
  app:
    name: ${spring.application.name}
    description: Attendee Experience Service
    version: ${build.version:1.0.0}
  build:
    artifact: ${build.artifact:attendee-experience-service}
    version: ${build.version:1.0.0}
    time: ${build.time:unknown}
  git:
    commit:
      id: ${git.commit.id.abbrev:unknown}
      time: ${git.commit.time:unknown}
    branch: ${git.branch:unknown}
