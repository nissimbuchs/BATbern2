<!-- subject: Registrierungsbestätigung - {{eventTitle}} -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registrierungsbestätigung</title>
</head>
<body>
    <h1>Registrierungsbestätigung</h1>
    <p>Hallo ${attendeeName},</p>
    <p>Vielen Dank für Ihre Registrierung für ${eventTitle}.</p>
    <p><strong>Registrierungscode:</strong> ${registrationCode}</p>
    <p><strong>Veranstaltungsort:</strong> ${venueName}</p>
    <p><strong>Datum:</strong> ${eventDate}</p>
    <p><strong>Zeit:</strong> ${eventTime}</p>
    <p>Mit freundlichen Grüssen,<br>${organizerName}</p>
</body>
</html>
