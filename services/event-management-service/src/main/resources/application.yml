server:
  port: 8080
  compression:
    enabled: false

spring:
  application:
    name: event-management-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.${AWS_REGION:eu-central-1}.amazonaws.com/${COGNITO_USER_POOL_ID}/.well-known/jwks.json
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false
    validate-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_event_management

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
    build:
      enabled: true

# AWS Configuration
aws:
  region: ${AWS_REGION:eu-central-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:batbern-development-company-logos}
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:https://cdn.batbern.ch}

# User Service Configuration (API-based user data access)
# Uses ECS Service Connect DNS for service-to-service communication in AWS
# Format: http://<service-name>:<port> (resolves via CloudMap namespace: batbern.local)
user-service:
  base-url: ${COMPANY_USER_MANAGEMENT_SERVICE_URL:http://company-user-management:8080}

# Email Configuration (Story 2.2a Task B12)
app:
  base-url: ${APP_BASE_URL:https://batbern.ch}
  email:
    from: ${EMAIL_FROM:noreply@batbern.ch}
    from-name: ${EMAIL_FROM_NAME:BATbern Platform}
    organizer-name: ${EMAIL_ORGANIZER_NAME:BATbern Team}
    organizer-email: ${EMAIL_ORGANIZER:events@batbern.ch}

# Application Info (exposed via /actuator/info)
info:
  app:
    name: ${spring.application.name}
    description: Event Management Service
    version: ${build.version:1.0.0}
  build:
    artifact: ${build.artifact:event-management-service}
    version: ${build.version:1.0.0}
    time: ${build.time:unknown}
  git:
    commit:
      id: ${git.commit.id.abbrev:unknown}
      time: ${git.commit.time:unknown}
    branch: ${git.branch:unknown}

---
# Local Development Profile
spring:
  config:
    activate:
      on-profile: local

# Local development uses localhost for user service
# Supports multi-instance development via COMPANY_USER_MANAGEMENT_SERVICE_URL env var
user-service:
  base-url: ${COMPANY_USER_MANAGEMENT_SERVICE_URL:http://localhost:8081}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:batbern-development-company-logos}
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:http://localhost:9000}

---
# Test Profile Configuration
spring:
  config:
    activate:
      on-profile: test

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/oauth2/default
          jwk-set-uri: http://localhost:9999/oauth2/default/v1/keys
