plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.6'
    id 'io.spring.dependency-management' version '1.1.6'
    id 'jacoco'
    id 'org.flywaydb.flyway' version '10.10.0'
    id 'org.openapi.generator' version '7.2.0'
    id 'com.gorylenko.gradle-git-properties' version '2.4.1'
}

group = 'ch.batbern'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'

    // Database
    implementation 'org.postgresql:postgresql:42.7.4'
    implementation 'org.flywaydb:flyway-core:10.21.0'
    implementation 'org.flywaydb:flyway-database-postgresql:10.21.0'

    // Caching (Caffeine in-memory cache)
    implementation 'com.github.ben-manes.caffeine:caffeine:3.1.8'

    // Shared kernel (API utilities from Story 1.15a)
    implementation project(':shared-kernel')

    // AWS SDK for EventBridge
    implementation platform('software.amazon.awssdk:bom:2.29.45')
    implementation 'software.amazon.awssdk:eventbridge'

    // OpenAPI documentation
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'

    // OpenAPI Generator - Required for generated code
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.20'
    implementation 'jakarta.validation:jakarta.validation-api'
    implementation 'jakarta.annotation:jakarta.annotation-api'

    // Lombok (reduce boilerplate)
    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'
    testCompileOnly 'org.projectlombok:lombok:1.18.36'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.36'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.testcontainers:testcontainers:1.21.3'
    testImplementation 'org.testcontainers:postgresql:1.21.3'
    testImplementation 'org.testcontainers:junit-jupiter:1.21.3'
    // Note: H2 removed - all integration tests use Testcontainers PostgreSQL for production parity
}

test {
    useJUnitPlatform()
   testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat = 'full'
    }

    // Increase timeout for CI environments with Testcontainers
    // Individual test timeout: 5 minutes (handles slow Testcontainers startup in CI)
    timeout = java.time.Duration.ofMinutes(5)

    // System properties for test execution
    systemProperty 'junit.jupiter.execution.timeout.default', '5m'
    systemProperty 'junit.jupiter.execution.timeout.testable.method.default', '5m'
}

jacoco {
    toolVersion = "0.8.10"
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

test.finalizedBy jacocoTestReport

jacocoTestCoverageVerification {
    violationRules {
        rule {
            limit {
                // Minimal threshold for skeleton services
                // TODO: Increase to 0.90 once service is fully implemented
                minimum = 0.0
            }
        }
    }
}

check.dependsOn jacocoTestCoverageVerification

// Apply Trivy security scanning
apply from: "../../gradle/trivy-security.gradle"

// Generate build-info.properties for Spring Boot Actuator
springBoot {
    buildInfo()
}

// Configure git.properties generation
gitProperties {
    keys = ['git.branch', 'git.commit.id', 'git.commit.id.abbrev', 'git.commit.time']
    dateFormat = "yyyy-MM-dd'T'HH:mm:ssZ"
    dateFormatTimeZone = "UTC"
    // Allow build to continue if git directory is not available (e.g., in Docker)
    failOnNoGitDirectory = false
    extProperty = 'gitProps'
}

// Flyway configuration for database migrations
flyway {
    url = System.getProperty('flyway.url', 'jdbc:postgresql://localhost:5432/batbern')
    user = System.getProperty('flyway.user', 'batbern_user')
    password = System.getProperty('flyway.password', 'batbern-dev-password')
    locations = ['classpath:db/migration']
    baselineOnMigrate = true
    baselineVersion = '0'
}

// OpenAPI Generator - Generate API interfaces and DTOs from OpenAPI spec
openApiGenerate {
    generatorName = 'spring'
    inputSpec = "$rootDir/docs/api/events-api.openapi.yml".toString()
    outputDir = "$buildDir/generated".toString()
    apiPackage = 'ch.batbern.events.api.generated'
    modelPackage = 'ch.batbern.events.dto.generated'
    invokerPackage = 'ch.batbern.events.api.invoker'
    validateSpec = false  // Skip validation for custom license fields

    // Import mappings - use shared-kernel types instead of generating
    importMappings = [
        'ErrorResponse': 'ch.batbern.shared.dto.ErrorResponse',
        'PaginationMetadata': 'ch.batbern.shared.api.PaginationMetadata',
        'PaginatedResponse': 'ch.batbern.shared.dto.PaginatedResponse'
    ]

    // Type mappings - map OpenAPI schemas to shared-kernel classes
    typeMappings = [
        'ErrorResponse': 'ch.batbern.shared.dto.ErrorResponse',
        'PaginationMetadata': 'ch.batbern.shared.api.PaginationMetadata'
    ]

    configOptions = [
        dateLibrary: 'java8',
        interfaceOnly: 'true',              // Only generate API interfaces
        skipDefaultInterface: 'true',       // Don't generate default implementations
        useTags: 'true',                    // Use OpenAPI tags to organize API interfaces
        useSpringBoot3: 'true',             // Use Spring Boot 3 annotations
        documentationProvider: 'none',      // Avoid conflicts with springdoc-openapi
        openApiNullable: 'false',           // Don't use JsonNullable wrapper
        hideGenerationTimestamp: 'true',    // Cleaner generated code
        useBeanValidation: 'true',          // Include @Valid, @NotNull annotations
        performBeanValidation: 'true',      // Enable bean validation
        useOptional: 'false',               // Use standard types instead of Optional
        delegatePattern: 'false',           // We implement interfaces directly
        useJakartaEe: 'true'                // Use Jakarta EE (Spring Boot 3 requirement)
    ]

    // Generate only models and API interfaces (skip implementation)
    globalProperties = [
        models: '',
        apis: '',
        supportingFiles: 'ApiUtil.java'
    ]

    // Skip generation of shared-kernel types
    schemaMappings = [
        'ErrorResponse': 'ch.batbern.shared.dto.ErrorResponse',
        'PaginationMetadata': 'ch.batbern.shared.api.PaginationMetadata'
    ]
}

// Make compileJava depend on openApiGenerate
compileJava.dependsOn tasks.openApiGenerate

// Add generated sources to source sets
sourceSets {
    main {
        java {
            srcDir "$buildDir/generated/src/main/java"
        }
    }
}

// Clean generated sources when running clean
clean {
    delete "$buildDir/generated"
}
