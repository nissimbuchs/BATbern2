server:
  port: 8080
  compression:
    enabled: false

spring:
  application:
    name: speaker-coordination-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/batbern}
    username: ${DATABASE_USERNAME:batbern_user}
    password: ${DATABASE_PASSWORD:batbern-dev-password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.${AWS_REGION:eu-central-1}.amazonaws.com/${COGNITO_USER_POOL_ID}/.well-known/jwks.json
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false
    validate-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_speaker_coordination

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
    build:
      enabled: true

# Application Info (exposed via /actuator/info)
info:
  app:
    name: ${spring.application.name}
    description: Speaker Coordination Service
    version: ${build.version:1.0.0}
  build:
    artifact: ${build.artifact:speaker-coordination-service}
    version: ${build.version:1.0.0}
    time: ${build.time:unknown}
  git:
    commit:
      id: ${git.commit.id.abbrev:unknown}
      time: ${git.commit.time:unknown}
    branch: ${git.branch:unknown}
